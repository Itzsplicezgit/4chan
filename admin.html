<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DarkChan Admin</title>
</head>
<body>

    <!-- Auth Layer -->
    <div id="login-form">
        <h2>Enter Admin Password</h2>
        <input type="password" id="admin-pass" placeholder="Password...">
        <button id="login-btn" onclick="login()">Access Panel</button>
        <p id="cooldown-msg" style="color: red; font-weight: bold; margin-top: 10px; display: none;"></p>
    </div>

    <!-- Main Dashboard Pane (Hidden by Default) -->
    <div id="admin-panel" style="display: none;">
        <h1>DarkChan Management Terminal</h1>
        <hr />

        <!-- Board Management Section -->
        <h2>Manage Boards</h2>
        <form id="create-board-form" onsubmit="createBoard(event)">
            <input type="text" id="board-name" placeholder="Unique Handle (e.g. memes)" required>
            <input type="text" id="board-title" placeholder="Display Title" required>
            <select id="board-type" required>
                <option value="mixed">Mixed</option>
                <option value="images">Images Only</option>
                <option value="videos">Videos Only</option>
                <option value="chat">Chat Lobby</option>
            </select>
            <button type="submit">Deploy Board</button>
        </form>

        <h3>Active Boards</h3>
        <ul id="boards-list"></ul>
        <hr />

        <!-- Admin Direct Broadcast Panel -->
        <h2>Direct Admin Upload Terminal (Bypass Restrictions)</h2>
        <form id="admin-direct-upload-form" onsubmit="handleAdminDirectUpload(event)">
            <div style="margin-bottom: 10px;">
                <label style="display:block; font-weight:bold; margin-bottom:5px;">Select Destination Board</label>
                <select id="admin-upload-target-board" onchange="toggleAdminUploadFieldType()" required>
                    <option value="">Select Board...</option>
                </select>
            </div>
            
            <div style="margin-bottom: 10px;" id="admin-dynamic-input-zone">
                <label style="display:block; font-weight:bold; margin-bottom:5px;">Select File(s)</label>
                <input type="file" id="admin-direct-files" multiple required>
                <p style="font-size:12px; color:green; margin-top:4px;">✓ Admin Status Active: 20MB payload caps completely disabled.</p>
            </div>

            <button type="submit" id="admin-upload-submit-btn">Execute Immediate Push</button>
        </form>
        <div id="admin-upload-status" style="margin-top: 10px; font-weight: bold;"></div>
        <hr />

        <!-- Specific Item Moderation -->
        <h2>Search & Destroy Post</h2>
        <input type="text" id="search-post-id" placeholder="Enter Post ID...">
        <button onclick="deletePostById()">Delete Permanently</button>
        <hr />

        <!-- Moderation Queue Component -->
        <h2>Mod Queue (<span id="queue-count">0</span> remaining)</h2>
        <div id="queue-container">
            <p>No posts waiting for review.</p>
        </div>
    </div>

    <script>
        let currentPassword = '';
        let pendingQueue = [];
        let boardsCache = {};
        let cooldownTimer = null;

        function login() {
            const passInput = document.getElementById('admin-pass').value;
            if (!passInput) return alert('Enter a password');
            currentPassword = passInput;
            
            fetchData();
        }

        function startFrontendCooldown(seconds) {
            const loginBtn = document.getElementById('login-btn');
            const cooldownMsg = document.getElementById('cooldown-msg');
            
            loginBtn.disabled = true;
            cooldownMsg.style.display = 'block';
            
            let timeLeft = seconds;
            
            if (cooldownTimer) clearInterval(cooldownTimer);
            
            cooldownTimer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(cooldownTimer);
                    loginBtn.disabled = false;
                    cooldownMsg.style.display = 'none';
                    cooldownMsg.textContent = '';
                } else {
                    cooldownMsg.textContent = `Too many failed attempts. Try again in ${timeLeft} seconds.`;
                    timeLeft--;
                }
            }, 1000);
        }

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'x-admin-password': currentPassword
            };
        }

        async function fetchData() {
            try {
                const response = await fetch('/api/data', {
                    headers: getHeaders()
                });
                
                // Handle backend rate limiting / spam protection
                if (response.status === 429) {
                    const errorData = await response.json().catch(() => ({}));
                    // Tries to look for a specific cooldown wait time back from the API, defaults to 30s
                    const retryAfter = errorData.retryAfter || 30; 
                    startFrontendCooldown(retryAfter);
                    throw new Error(errorData.error || `Rate limit exceeded. Locked for ${retryAfter} seconds.`);
                }
                
                if (!response.ok) {
                    throw new Error('Invalid credentials or connection dropped.');
                }
                
                const data = await response.json();
                
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                
                boardsCache = data.boards || {};
                renderBoards();
                populateAdminUploadDropdown();
                
                pendingQueue = data.pendingPosts || [];
                renderQueue();
            } catch (err) {
                alert(err.message);
                currentPassword = '';
            }
        }

        function renderBoards() {
            const list = document.getElementById('boards-list');
            list.innerHTML = '';
            
            const sortedKeys = Object.keys(boardsCache).sort((a, b) => {
                return (boardsCache[a].position ?? 0) - (boardsCache[b].position ?? 0);
            });
            
            sortedKeys.forEach((key, index) => {
                const board = boardsCache[key];
                const li = document.createElement('li');
                li.style.margin = "8px 0";
                li.innerHTML = `
                    <button onclick="moveBoard('${key}', -1)">↑</button>
                    <button onclick="moveBoard('${key}', 1)">↓</button>
                    <strong>/${key}</strong> - ${board.title} (${board.type})
                    <button onclick="downloadBoardZip('${key}')">📦 Download ZIP</button>
                    <button onclick="deleteBoard('${key}')" style="color: red;">❌ Drop Board</button>
                `;
                list.appendChild(li);
            });
        }

        function populateAdminUploadDropdown() {
            const dropdown = document.getElementById('admin-upload-target-board');
            const savedSelection = dropdown.value;
            dropdown.innerHTML = '<option value="">Select Board...</option>';
            
            Object.keys(boardsCache).sort((a, b) => {
                return (boardsCache[a].position ?? 0) - (boardsCache[b].position ?? 0);
            }).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = `/${key}/ - ${boardsCache[key].title}`;
                dropdown.appendChild(opt);
            });

            if (savedSelection && boardsCache[savedSelection]) {
                dropdown.value = savedSelection;
            }
            toggleAdminUploadFieldType();
        }

        function toggleAdminUploadFieldType() {
            const boardKey = document.getElementById('admin-upload-target-board').value;
            const inputZone = document.getElementById('admin-dynamic-input-zone');
            
            if (!boardKey || !boardsCache[boardKey]) {
                inputZone.innerHTML = `
                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Select File(s)</label>
                    <input type="file" id="admin-direct-files" multiple disabled required>
                    <p style="font-size:12px; color:green; margin-top:4px;">✓ Admin Status Active: 20MB payload caps completely disabled.</p>
                `;
                return;
            }

            const meta = boardsCache[boardKey];
            if (meta.type === 'chat') {
                inputZone.innerHTML = `
                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Broadcast Text Stream Message</label>
                    <textarea id="admin-direct-message" style="width:100%; height:60px;" placeholder="Type broadcast message..." required></textarea>
                    <p style="font-size:12px; color:green; margin-top:4px;">✓ Admin Context: Character limits, cooldown loops, and safety checks bypassed.</p>
                `;
            } else if (meta.type === 'images') {
                inputZone.innerHTML = `
                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Select Photo Assets (Multiple Allowed)</label>
                    <input type="file" id="admin-direct-files" accept="image/*" multiple required>
                    <p style="font-size:12px; color:green; margin-top:4px;">✓ Admin Status Active: 20MB payload caps completely disabled.</p>
                `;
            } else if (meta.type === 'videos') {
                inputZone.innerHTML = `
                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Select Video Assets (Multiple Allowed)</label>
                    <input type="file" id="admin-direct-files" accept="video/*" multiple required>
                    <p style="font-size:12px; color:green; margin-top:4px;">✓ Admin Status Active: 20MB payload caps completely disabled.</p>
                `;
            } else {
                inputZone.innerHTML = `
                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Select Media Assets (Multiple Allowed)</label>
                    <input type="file" id="admin-direct-files" accept="image/*,video/*" multiple required>
                    <p style="font-size:12px; color:green; margin-top:4px;">✓ Admin Status Active: 20MB payload caps completely disabled.</p>
                `;
            }
        }

        async function handleAdminDirectUpload(event) {
            event.preventDefault();
            const board = document.getElementById('admin-upload-target-board').value;
            const statusBox = document.getElementById('admin-upload-status');
            const submitBtn = document.getElementById('admin-upload-submit-btn');
            
            if (!board || !boardsCache[board]) return;
            
            const meta = boardsCache[board];
            submitBtn.disabled = true;
            statusBox.style.color = '#ffffff';
            statusBox.textContent = 'Processing bypass transmission...';

            try {
                if (meta.type === 'chat') {
                    const msgValue = document.getElementById('admin-direct-message').value.trim();
                    const formData = new FormData();
                    formData.append('room', board);
                    formData.append('message', msgValue);
                    formData.append('bypass_limits', 'true');

                    const response = await fetch('/api/posts/chat', {
                        method: 'POST',
                        headers: { 'x-admin-password': currentPassword },
                        body: formData
                    });

                    if (!response.ok) throw new Error(await response.text());
                    statusBox.style.color = 'green';
                    statusBox.textContent = 'Broadcast update published successfully.';
                } else {
                    const fileInput = document.getElementById('admin-direct-files');
                    const files = fileInput.files;
                    if (!files.length) return;

                    let successCount = 0;
                    for (let i = 0; i < files.length; i++) {
                        statusBox.textContent = `Uploading item ${i + 1} of ${files.length}...`;
                        const formData = new FormData();
                        formData.append('node', board);
                        formData.append('media', files[i]);
                        formData.append('bypass_limits', 'true');

                        const response = await fetch('/api/public/upload', {
                            method: 'POST',
                            headers: { 'x-admin-password': currentPassword },
                            body: formData
                        });

                        if (response.ok) successCount++;
                    }
                    statusBox.style.color = 'green';
                    statusBox.textContent = `Batch push finished. ${successCount}/${files.length} uploads cleared into live database.`;
                }

                document.getElementById('admin-direct-upload-form').reset();
                toggleAdminUploadFieldType();
                fetchData();
            } catch (err) {
                statusBox.style.color = 'red';
                statusBox.textContent = `Transmission failed: ${err.message}`;
            } finally {
                submitBtn.disabled = false;
            }
        }

        async function moveBoard(key, direction) {
            const sortedKeys = Object.keys(boardsCache).sort((a, b) => {
                return (boardsCache[a].position ?? 0) - (boardsCache[b].position ?? 0);
            });

            const index = sortedKeys.indexOf(key);
            const targetIndex = index + direction;

            if (targetIndex < 0 || targetIndex >= sortedKeys.length) return;

            const temp = sortedKeys[index];
            sortedKeys[index] = sortedKeys[targetIndex];
            sortedKeys[targetIndex] = temp;

            try {
                const res = await fetch('/api/boards/reorder', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ order: sortedKeys })
                });
                const data = await res.json();
                if (data.success) {
                    sortedKeys.forEach((k, idx) => {
                        boardsCache[k].position = idx;
                    });
                    renderBoards();
                    populateAdminUploadDropdown();
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Failed to synchronize board reorder tracking layout.");
            }
        }

        function renderQueue() {
            const container = document.getElementById('queue-container');
            document.getElementById('queue-count').innerText = pendingQueue.length;
            container.innerHTML = '';

            if (pendingQueue.length === 0) {
                container.innerHTML = '<p>No posts waiting for review.</p>';
                return;
            }

            const batchedView = pendingQueue.slice(0, 5);

            batchedView.forEach(post => {
                const div = document.createElement('div');
                div.style.border = "1px solid black";
                div.style.margin = "5px 0";
                div.style.padding = "5px";

                let contentSnippet = '';
                if (post.type === 'text') {
                    contentSnippet = `<p><strong>Text:</strong> ${post.message}</p>`;
                } else if (post.type === 'image' || post.type === 'video') {
                    contentSnippet = `<p><strong>Media Source:</strong> <a href="${post.src}" target="_blank">${post.src}</a></p>`;
                }

                div.innerHTML = `
                    <p><strong>ID:</strong> ${post.id} | <strong>Board:</strong> /${post.board} | <strong>Type:</strong> ${post.type}</p>
                    ${contentSnippet}
                    <button onclick="moderatePost('${post.id}', 'approve')" style="color: green; font-weight: bold; margin-right: 10px;">V (Approve)</button>
                    <button onclick="moderatePost('${post.id}', 'deny')" style="color: red; font-weight: bold;">X (Deny)</button>
                `;
                container.appendChild(div);
            });
        }

        async function createBoard(e) {
            e.preventDefault();
            const name = document.getElementById('board-name').value;
            const title = document.getElementById('board-title').value;
            const type = document.getElementById('board-type').value;

            const res = await fetch('/api/boards/create', {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ name, title, type })
            });
            const data = await res.json();
            alert(data.message || data.error);
            if (data.success) {
                document.getElementById('create-board-form').reset();
                fetchData();
            }
        }

        async function deleteBoard(name) {
            if (!confirm(`Are you absolutely sure you want to drop /${name}? This clears all posts!`)) return;
            
            const res = await fetch('/api/boards/delete', {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            alert(data.message || data.error);
            fetchData();
        }

        function downloadBoardZip(name) {
            const targetUrl = `/api/boards/download/${name}`;
            const clientLink = document.createElement('a');
            
            fetch(targetUrl, { headers: getHeaders() })
                .then(res => {
                    if (!res.ok) throw new Error("Could not download archive file layout structures.");
                    return res.blob();
                })
                .then(blob => {
                    const downloadUrl = window.URL.createObjectURL(blob);
                    clientLink.href = downloadUrl;
                    clientLink.download = `darkchan-board-${name}-export.zip`;
                    document.body.appendChild(clientLink);
                    clientLink.click();
                    clientLink.remove();
                })
                .catch(err => alert(err.message));
        }

        async function moderatePost(id, action) {
            const res = await fetch('/api/posts/approve', {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ id, action })
            });
            const data = await res.json();
            if (data.success) {
                pendingQueue = pendingQueue.filter(p => String(p.id) !== String(id));
                renderQueue();
            } else {
                alert(data.error);
            }
        }

        async function deletePostById() {
            const id = document.getElementById('search-post-id').value.trim();
            if (!id) return alert('Input an item ID');

            if (!confirm(`Delete item ID: ${id} directly from live database?`)) return;

            const res = await fetch('/api/posts/delete', {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ id })
            });
            const data = await res.json();
            alert(data.message || data.error);
            if (data.success) {
                document.getElementById('search-post-id').value = '';
                fetchData();
            }
        }
    </script>
</body>
</html>
