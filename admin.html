<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel - Admin Platform</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ffffff;
            font-size: 26px;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
            border-bottom: 2px solid #2d2d2d;
            padding-bottom: 10px;
        }
        h2 {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .section-wrapper {
            background-color: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .grid-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-split { grid-template-columns: 1fr; }
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: #aaaaaa;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            color: #ffffff;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #ffffff;
        }
        button {
            background: #ffffff;
            color: #121212;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.15s;
            margin-top: 5px;
        }
        button:hover { 
            opacity: 0.9;
        }
        .danger-btn {
            background: #cf6679;
            color: #ffffff;
        }
        .danger-btn:hover { 
            opacity: 0.9;
        }
        .queue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        .queue-card {
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .queue-media {
            width: 100%;
            height: 150px;
            background: #121212;
            position: relative;
            border-bottom: 1px solid #3d3d3d;
        }
        .queue-media img, .queue-media video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .queue-meta {
            padding: 10px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: #aaaaaa;
        }
        .meta-target {
            color: #ffffff;
            font-weight: bold;
        }
        .queue-actions {
            display: flex;
            gap: 6px;
            padding: 0 10px 10px;
            margin-top: auto;
        }
        .queue-actions button {
            margin-top: 0;
            padding: 6px;
            font-size: 12px;
        }
        .queue-count-badge {
            background: #2d2d2d;
            color: #ffffff;
            padding: 2px 8px;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
            display: inline-block;
            vertical-align: middle;
        }
        .progress-box {
            display: none;
            margin-top: 12px;
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            overflow: hidden;
            height: 20px;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: #ffffff;
            width: 0%;
        }
        .progress-indicator-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            left: 0;
            font-size: 12px;
            line-height: 18px;
            font-weight: bold;
            color: #121212;
        }
        .status-msg {
            margin-top: 12px;
            font-size: 13px;
            white-space: pre-line;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>System Control Panel</h1>

        <div class="section-wrapper" id="authGate">
            <h2>System Authentication</h2>
            <div class="form-group">
                <label for="adminPassword">Master System Password</label>
                <input type="password" id="adminPassword" placeholder="Enter security passphrase...">
            </div>
            <button id="verifyCredentialsBtn">Establish Active Session</button>
        </div>

        <div id="controlDashboard" style="display: none;">
            
            <div class="section-wrapper">
                <h2>
                    Pending Submissions Queue 
                    <span class="queue-count-badge" id="queueTotalCount">Total: 0</span>
                </h2>
                <div id="queueStatusMessage" style="color: #aaaaaa; font-style: italic; margin-bottom: 8px; font-size: 12px;"></div>
                <div class="queue-grid" id="approvalQueueGrid">
                </div>
            </div>

            <div class="grid-split">
                
                <div class="section-wrapper">
                    <h2>Create Asset Category Board</h2>
                    <form id="createBoardForm">
                        <div class="form-group">
                            <label for="boardName">Unique Board Handle (No Spaces/Lowercase)</label>
                            <input type="text" id="boardName" placeholder="e.g., coolartwork" required>
                        </div>
                        <div class="form-group">
                            <label for="boardTitle">Display Name Title</label>
                            <input type="text" id="boardTitle" placeholder="e.g., Cool Artwork Space" required>
                        </div>
                        <div class="form-group">
                            <label for="boardType">Structural Collection Feed Type</label>
                            <select id="boardType">
                                <option value="mixed">Mixed Media Content Assets</option>
                                <option value="images">Exclusively Images</option>
                                <option value="videos">Exclusively Videos</option>
                            </select>
                        </div>
                        <button type="submit">Deploy Board Category</button>
                    </form>
                </div>

                <div class="section-wrapper">
                    <h2>Decommission Board Category</h2>
                    <form id="deleteBoardForm">
                        <div class="form-group">
                            <label for="deleteBoardSelector">Choose Targets For Destruction</label>
                            <select id="deleteBoardSelector" required>
                                <option value="">Loading Boards...</option>
                            </select>
                        </div>
                        <button type="submit" class="danger-btn">Delete Board & Associated Files</button>
                    </form>
                </div>

            </div>

            <div class="section-wrapper" style="margin-top: 2rem;">
                <h2>Direct Fast Upload (Bypass Queue System)</h2>
                <form id="adminDirectUploadForm">
                    <div class="grid-split" style="gap: 12px; margin-bottom: 12px;">
                        <div class="form-group">
                            <label for="uploadBoardSelector">Target Destination Board</label>
                            <select id="uploadBoardSelector" required>
                                <option value="">Loading Boards...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="customPostId">Custom Post ID String (Optional / Unique)</label>
                            <input type="text" id="customPostId" placeholder="Auto-generated if left blank">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="directMediaFiles">Select Files for Instant Publication</label>
                        <input type="file" id="directMediaFiles" style="color:#ffffff; font-size:12px;" accept="image/*,video/*" multiple required>
                    </div>
                    <button type="submit">Publish Live Instantly</button>
                </form>

                <div class="progress-box" id="adminUploadProgressBox">
                    <div class="progress-fill" id="adminUploadProgressFill"></div>
                    <div class="progress-indicator-text" id="adminUploadProgressText">0%</div>
                </div>
                <div class="status-msg" id="adminUploadStatusMsg"></div>
            </div>

            <div class="section-wrapper">
                <h2>Delete Active Content From Feed</h2>
                <form id="deletePostForm">
                    <div class="form-group">
                        <label for="deletePostId">Enter Post ID String</label>
                        <input type="text" id="deletePostId" placeholder="e.g., 583921" required>
                    </div>
                    <button type="submit" class="danger-btn">Wipe Active Item From Server</button>
                </form>
                <div class="status-msg" id="deletePostStatusMsg"></div>
            </div>

        </div>
    </div>

    <script>
        let serverCache = { boards: {}, posts: [], pendingPosts: [] };

        function getAuthPassword() {
            return document.getElementById('adminPassword').value;
        }

        async function runInitialValidation() {
            const currentPass = getAuthPassword();
            if (!currentPass) {
                alert('Please enter a password first.');
                return;
            }
            try {
                const res = await fetch('/api/data', {
                    headers: { 'x-admin-password': currentPass }
                });
                
                if (res.status === 401) {
                    alert('Invalid master system security passphrase.');
                    return;
                }
                if (!res.ok) throw new Error();
                
                serverCache = await res.json();
                
                document.getElementById('authGate').style.display = 'none';
                document.getElementById('controlDashboard').style.display = 'block';
                
                refreshDashboardViews();
            } catch (err) {
                alert('Database structural tracking dataset sync failed.');
            }
        }

        async function synchroniseState() {
            try {
                const res = await fetch('/api/data', {
                    headers: { 'x-admin-password': getAuthPassword() }
                });
                if (res.ok) {
                    serverCache = await res.json();
                    refreshDashboardViews();
                }
            } catch (e) {
                console.error("State sync background job interrupted:", e);
            }
        }

        function refreshDashboardViews() {
            populateSelectorDropdowns();
            renderProgressiveQueueGrid();
        }

        function populateSelectorDropdowns() {
            const delSelector = document.getElementById('deleteBoardSelector');
            const uploadSelector = document.getElementById('uploadBoardSelector');
            
            const savedDelVal = delSelector.value;
            const savedUpVal = uploadSelector.value;

            delSelector.innerHTML = '<option value="">Select a board...</option>';
            uploadSelector.innerHTML = '<option value="">Select a board...</option>';

            const boardsList = Object.keys(serverCache.boards);

            boardsList.forEach(key => {
                const title = serverCache.boards[key].title;
                
                const opt1 = document.createElement('option');
                opt1.value = key;
                opt1.textContent = `/${key}/ - ${title}`;
                delSelector.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = key;
                opt2.textContent = `/${key}/ - ${title}`;
                uploadSelector.appendChild(opt2);
            });

            if (boardsList.includes(savedDelVal)) delSelector.value = savedDelVal;
            if (boardsList.includes(savedUpVal)) uploadSelector.value = savedUpVal;
        }

        function renderProgressiveQueueGrid() {
            const grid = document.getElementById('approvalQueueGrid');
            const totalCountBadge = document.getElementById('queueTotalCount');
            const statusTxt = document.getElementById('queueStatusMessage');
            
            grid.innerHTML = '';
            
            const pendingList = serverCache.pendingPosts || [];
            totalCountBadge.textContent = `Total: ${pendingList.length}`;

            if (pendingList.length === 0) {
                statusTxt.textContent = "The queue is clear. No items are waiting for approval.";
                return;
            }

            statusTxt.textContent = `Displaying the top 5 oldest submissions to avoid page lag.`;

            const visibleSlice = pendingList.slice(0, 5);

            visibleSlice.forEach(item => {
                const card = document.createElement('div');
                card.className = 'queue-card';

                const mediaBox = document.createElement('div');
                mediaBox.className = 'queue-media';

                if (item.type === 'video') {
                    const video = document.createElement('video');
                    video.src = item.src;
                    video.controls = true;
                    video.preload = 'metadata';
                    mediaBox.appendChild(video);
                } else {
                    const img = document.createElement('img');
                    img.src = item.src;
                    mediaBox.appendChild(img);
                }

                const meta = document.createElement('div');
                meta.className = 'queue-meta';
                meta.innerHTML = `
                    <div><strong>ID:</strong> ${item.id}</div>
                    <div><strong>Target Board:</strong> <span class="meta-target">/${item.board}/</span></div>
                `;

                const actions = document.createElement('div');
                actions.className = 'queue-actions';

                const approveBtn = document.createElement('button');
                approveBtn.textContent = 'Approve';
                approveBtn.addEventListener('click', () => processQueueAction(item.id, 'approve'));

                const rejectBtn = document.createElement('button');
                rejectBtn.textContent = 'Deny';
                rejectBtn.className = 'danger-btn';
                rejectBtn.addEventListener('click', () => processQueueAction(item.id, 'reject'));

                actions.appendChild(approveBtn);
                actions.appendChild(rejectBtn);
                
                card.appendChild(mediaBox);
                card.appendChild(meta);
                card.appendChild(actions);
                grid.appendChild(card);
            });
        }

        async function processQueueAction(postId, actionType) {
            try {
                const response = await fetch('/api/posts/approve', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-password': getAuthPassword()
                    },
                    body: JSON.stringify({ id: postId, action: actionType })
                });

                const outcome = await response.json();
                if (response.ok && outcome.success) {
                    serverCache.pendingPosts = serverCache.pendingPosts.filter(p => p.id !== String(postId));
                    
                    if (actionType === 'approve') {
                        synchroniseState(); 
                    } else {
                        renderProgressiveQueueGrid();
                    }
                } else {
                    alert(outcome.error || 'Failed to complete task action against queue.');
                }
            } catch (err) {
                alert('Network request execution error processing verification steps.');
            }
        }

        document.getElementById('createBoardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('boardName').value.trim();
            const title = document.getElementById('boardTitle').value.trim();
            const type = document.getElementById('boardType').value;

            try {
                const res = await fetch('/api/boards/create', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-admin-password': getAuthPassword()
                    },
                    body: JSON.stringify({ name, title, type })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    alert('Category board deployed successfully!');
                    document.getElementById('createBoardForm').reset();
                    synchroniseState();
                } else {
                    alert(data.error || 'Process execution error.');
                }
            } catch (err) {
                alert('Connectivity loss running server routines.');
            }
        });

        document.getElementById('deleteBoardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('deleteBoardSelector').value;
            if (!name) return alert('Select target node category.');

            if (!confirm(`Are you completely sure you want to permanently delete board category "${name}"? This deletes ALL files associated with it.`)) return;

            try {
                const res = await fetch('/api/boards/delete', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-admin-password': getAuthPassword()
                    },
                    body: JSON.stringify({ name })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    alert('Board category tracking dropped.');
                    synchroniseState();
                } else {
                    alert(data.error || 'Decommission steps failed.');
                }
            } catch (err) {
                alert('System transaction interrupted.');
            }
        });

        document.getElementById('adminDirectUploadForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const board = document.getElementById('uploadBoardSelector').value;
            const customId = document.getElementById('customPostId').value;
            const files = document.getElementById('directMediaFiles').files;
            const statusMsg = document.getElementById('adminUploadStatusMsg');
            const progBox = document.getElementById('adminUploadProgressBox');
            const progFill = document.getElementById('adminUploadProgressFill');
            const progText = document.getElementById('adminUploadProgressText');

            if (!board || files.length === 0) {
                statusMsg.style.color = '#cf6679';
                statusMsg.textContent = 'Missing core upload assets.';
                return;
            }

            const formData = new FormData();
            formData.append('board', board);
            formData.append('customId', customId);
            for (let i = 0; i < files.length; i++) {
                formData.append('media', files[i]);
            }

            statusMsg.textContent = '';
            progBox.style.display = 'block';
            progFill.style.width = '0%';
            progText.textContent = '0%';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/posts/upload', true);
            
            xhr.setRequestHeader('x-admin-password', getAuthPassword());

            xhr.upload.addEventListener('progress', (event) => {
                if (event.lengthComputable) {
                    const pct = Math.round((event.loaded / event.total) * 100);
                    progFill.style.width = pct + '%';
                    progText.textContent = pct + '%';
                }
            });

            xhr.onload = function () {
                if (xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    statusMsg.style.color = '#b5bd68';
                    let text = response.message || 'Direct bypass upload succeeded!';
                    if (response.warnings) text += '\nWarnings:\n' + response.warnings.join('\n');
                    statusMsg.textContent = text;
                    document.getElementById('adminDirectUploadForm').reset();
                    synchroniseState();
                } else {
                    const response = JSON.parse(xhr.responseText);
                    statusMsg.style.color = '#cf6679';
                    statusMsg.textContent = response.error || 'Server error encountered processing bypassing routine.';
                }
            };

            xhr.send(formData);
        });

        document.getElementById('deletePostForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('deletePostId').value.trim();
            const msgNode = document.getElementById('deletePostStatusMsg');
            msgNode.textContent = '';

            try {
                const res = await fetch('/api/posts/delete', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-admin-password': getAuthPassword()
                    },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    msgNode.style.color = '#b5bd68';
                    msgNode.textContent = `Post ID ${id} wiped clean from tracking registers.`;
                    document.getElementById('deletePostForm').reset();
                    synchroniseState();
                } else {
                    msgNode.style.color = '#cf6679';
                    msgNode.textContent = data.error || 'Post removal failed.';
                }
            } catch (err) {
                msgNode.style.color = '#cf6679';
                msgNode.textContent = 'Network execution interrupt during post removal.';
            }
        });

        document.getElementById('verifyCredentialsBtn').addEventListener('click', runInitialValidation);
    </script>
</body>
</html>
