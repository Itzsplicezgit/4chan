<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/chan/ Control Admin Panel</title>
    <style>
        body {
            background-color: #f0f2f5;
            color: #222;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .admin-box {
            max-width: 600px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            border: 1px solid #b7c5d9;
            border-radius: 4px;
        }
        h2 { margin-top: 0; color: #af0a0f; border-bottom: 1px solid #b7c5d9; padding-bottom: 5px;}
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        label { font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        input, select, button {
            padding: 8px;
            border: 1px solid #b7c5d9;
            border-radius: 3px;
            font-size: 14px;
        }
        button {
            background-color: #d6daf0;
            color: #111;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #34345c;
        }
        button:hover { background-color: #b7c5d9; }
        .danger-btn { background-color: #ffdddd; border-color: #af0a0f; color: #af0a0f;}
        .danger-btn:hover { background-color: #ffcccc; }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px dashed #b7c5d9;
            font-size: 14px;
        }
        .action-row {
            display: flex;
            gap: 8px;
        }
        .action-row input {
            flex: 1;
        }
    </style>
</head>
<body>

    <div id="auth-panel" class="admin-box">
        <h2>Admin Authentication Required</h2>
        <div class="form-group">
            <label>Master System Password</label>
            <input type="password" id="admin-password" placeholder="Enter system key...">
        </div>
        <button onclick="savePasswordKey()">Access Panel</button>
    </div>

    <div id="control-panel" style="display:none;">
        
        <div class="admin-box">
            <h2>Create New Dynamic Board</h2>
            <div class="form-group">
                <label>Board Short Code URI (e.g. "pics", "vids")</label>
                <input type="text" id="new-board-name" placeholder="lowercase simple characters only...">
            </div>
            <div class="form-group">
                <label>Display Title String</label>
                <input type="text" id="new-board-title" placeholder="e.g. Photography Board...">
            </div>
            <div class="form-group">
                <label>Primary Medium Content Rule</label>
                <select id="new-board-type">
                    <option value="image">Image Board Format</option>
                    <option value="video">Video Board Format</option>
                </select>
            </div>
            <button onclick="createBoard()">Instantiate Board</button>
        </div>

        <div class="admin-box">
            <h2>Upload Media Asset Entry</h2>
            <div class="form-group">
                <label>Target Board Destination</label>
                <select id="upload-board-target"></select>
            </div>
            <div class="form-group">
                <label>Custom Post ID (Only for single file, multi-files will auto-index)</label>
                <input type="text" id="upload-custom-id" placeholder="e.g. 558291">
            </div>
            <div class="form-group">
                <label>Select Target Media Asset File(s)</label>
                <input type="file" id="upload-file-field" multiple>
            </div>
            
            <div id="progress-container" style="display:none; margin-bottom: 15px; background: #eee; border-radius: 3px; overflow: hidden;">
                <div id="progress-bar" style="width: 0%; height: 20px; background-color: #117743; color: white; text-align: center; font-size: 12px; line-height: 20px; font-weight: bold;">0%</div>
            </div>

            <button onclick="uploadContentAsset()">Post & Upload File(s)</button>
        </div>

        <div class="admin-box">
            <h2>System Active Boards</h2>
            <div id="boards-registry-list"></div>
        </div>

        <div class="admin-box">
            <h2>Delete Asset Post by ID</h2>
            <div class="form-group">
                <label>Target Post ID</label>
                <div class="action-row">
                    <input type="text" id="delete-post-id" placeholder="Enter target Item ID (e.g., 482910)">
                    <button class="danger-btn" onclick="deletePostAssetById()">Delete Asset</button>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        let masterPass = '';

        function savePasswordKey() {
            const passInput = document.getElementById('admin-password').value;
            if(passInput === 'fish') {
                masterPass = passInput;
                document.getElementById('auth-panel').style.display = 'none';
                document.getElementById('control-panel').style.display = 'block';
                refreshAdminDashboardView();
            } else {
                alert("Incorrect password code rejected.");
            }
        }

        async function refreshAdminDashboardView() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                const boardTargetSelect = document.getElementById('upload-board-target');
                const boardsList = document.getElementById('boards-registry-list');

                // Clear layout structures
                boardTargetSelect.innerHTML = '';
                boardsList.innerHTML = '';

                // Render Boards options & listings
                Object.keys(data.boards).forEach(name => {
                    const b = data.boards[name];
                    boardTargetSelect.innerHTML += `<option value="${name}">/${name}/ - ${b.title}</option>`;
                    
                    boardsList.innerHTML += `
                        <div class="list-item">
                            <span><strong>/${name}/</strong> - ${b.title} (${b.type})</span>
                            <button class="danger-btn" onclick="deleteBoard('${name}')">Delete Board</button>
                        </div>
                    `;
                });

            } catch (err) {
                console.error("Dashboard synchronization error:", err);
            }
        }

        async function createBoard() {
            const name = document.getElementById('new-board-name').value.trim();
            const title = document.getElementById('new-board-title').value.trim();
            const type = document.getElementById('new-board-type').value;

            if(!name || !title) return alert("Fill out input fields cleanly.");

            const response = await fetch('/api/boards/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-password': masterPass },
                body: JSON.stringify({ name, title, type })
            });
            
            const result = await response.json();
            if(result.error) alert(result.error);
            else {
                document.getElementById('new-board-name').value = '';
                document.getElementById('new-board-title').value = '';
                refreshAdminDashboardView();
            }
        }

        async function deleteBoard(name) {
            if(!confirm(`Are you absolutely sure you want to delete /${name}/ and wipe its entire file asset inventory?`)) return;

            await fetch('/api/boards/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-password': masterPass },
                body: JSON.stringify({ name })
            });
            refreshAdminDashboardView();
        }

        async function uploadContentAsset() {
            const board = document.getElementById('upload-board-target').value;
            const customId = document.getElementById('upload-custom-id').value;
            const fileInput = document.getElementById('upload-file-field');
            
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');

            if (!board || fileInput.files.length === 0) return alert("Missing upload fields parameters.");

            const formData = new FormData();
            formData.append('board', board);
            formData.append('customId', customId);
            formData.append('password', masterPass);

            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('media', fileInput.files[i]);
            }

            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/posts/upload', true);
            xhr.setRequestHeader('x-admin-password', masterPass);

            xhr.upload.onprogress = function (e) {
                if (e.lengthComputable) {
                    const percentage = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percentage + '%';
                    progressBar.textContent = percentage + '%';
                }
            };

            xhr.onload = function () {
                progressContainer.style.display = 'none';
                
                if (xhr.status === 200) {
                    const result = JSON.parse(xhr.responseText);
                    if (result.warnings) {
                        alert("Upload complete with some issues:\n" + result.warnings.join('\n'));
                    }
                    fileInput.value = '';
                    document.getElementById('upload-custom-id').value = '';
                    refreshAdminDashboardView();
                } else {
                    try {
                        const result = JSON.parse(xhr.responseText);
                        alert(result.error || "An unknown file process error occurred.");
                    } catch(e) {
                        alert("Server returned error status code: " + xhr.status);
                    }
                }
            };

            xhr.onerror = function () {
                progressContainer.style.display = 'none';
                alert("Network connection error during transfer event.");
            };

            xhr.send(formData);
        }

        async function deletePostAssetById() {
            const idInput = document.getElementById('delete-post-id');
            const id = idInput.value.trim();

            if (!id) return alert("Please specify an Asset ID to delete.");
            if (!confirm(`Remove item allocation ID: #${id}?`)) return;

            const response = await fetch('/api/posts/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-password': masterPass },
                body: JSON.stringify({ id })
            });

            const result = await response.json();
            if (result.error) {
                alert(result.error);
            } else {
                alert(`Successfully removed Post Asset #${id}`);
                idInput.value = '';
                refreshAdminDashboardView();
            }
        }
    </script>
</body>
</html>
