<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkChan Central Administration Control</title>
    <style>
        :root {
            --bg-dark: #121214;
            --bg-panel: #1a1a1e;
            --bg-input: #26262b;
            --accent-red: #ff4757;
            --accent-green: #2ed573;
            --accent-blue: #54a0ff;
            --text-main: #f1f2f6;
            --text-muted: #a4b0be;
            --border-color: #2f3542;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 30px;
        }

        h1 { font-size: 1.8rem; color: var(--text-main); }
        h2 { font-size: 1.3rem; margin-bottom: 15px; color: var(--text-muted); }

        .auth-bar {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input, select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-blue);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.95rem;
        }

        .btn-blue { background-color: var(--accent-blue); color: #fff; }
        .btn-blue:hover { background-color: #408ee0; }
        .btn-red { background-color: var(--accent-red); color: #fff; }
        .btn-red:hover { background-color: #e03d4c; }
        .btn-green { background-color: var(--accent-green); color: #fff; }
        .btn-green:hover { background-color: #26b962; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .board-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .board-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-input);
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .board-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .board-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .board-actions {
            display: flex;
            gap: 8px;
        }

        .board-actions button {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .queue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .queue-card {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .media-container {
            width: 100%;
            height: 160px;
            background-color: #0a0a0c;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .media-container img, .media-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.75);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--accent-blue);
        }

        .card-details {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-grow: 1;
            font-size: 0.85rem;
        }

        .card-meta { color: var(--text-muted); }

        .card-actions {
            display: flex;
            border-top: 1px solid var(--border-color);
        }

        .card-actions button {
            flex: 1;
            border-radius: 0;
            padding: 10px;
            font-size: 0.85rem;
        }

        .full-width-panel {
            grid-column: 1 / -1;
            margin-top: 10px;
        }

        .status-msg {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .status-success { background-color: rgba(46, 213, 115, 0.2); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .status-error { background-color: rgba(255, 71, 87, 0.2); color: var(--accent-red); border: 1px solid var(--accent-red); }
    </style>
</head>
<body>

    <header>
        <h1>DarkChan Master Control</h1>
        <div class="auth-bar">
            <input type="password" id="adminPassword" placeholder="Enter System Passphrase" value="fish">
            <button class="btn-blue" onclick="refreshAdminData()">Connect</button>
        </div>
    </header>

    <div id="statusBox" class="status-msg"></div>

    <div class="dashboard-grid">
        <!-- Panel: Create Board -->
        <div class="panel">
            <h2>Deploy New Board Category</h2>
            <form id="createBoardForm" onsubmit="handleCreateBoard(event)">
                <div class="form-group">
                    <label for="boardName">Unique Handle (URL slug, lowercase, no spaces)</label>
                    <input type="text" id="boardName" placeholder="e.g. memes" required>
                </div>
                <div class="form-group">
                    <label for="boardTitle">Display Title</label>
                    <input type="text" id="boardTitle" placeholder="e.g. Spicy Internet Memes" required>
                </div>
                <div class="form-group">
                    <label for="boardType">Content Strategy Type</label>
                    <select id="boardType">
                        <option value="mixed">Mixed (Images & Videos)</option>
                        <option value="images">Exclusively Images</option>
                        <option value="videos">Exclusively Videos</option>
                        <option value="chat">Pure Text Chat Lobby</option>
                    </select>
                </div>
                <button type="submit" class="btn-green" style="width: 100%;">Deploy Infrastructure Layer</button>
            </form>
        </div>

        <!-- Panel: Manage Boards -->
        <div class="panel">
            <h2>Active Infrastructure Registry</h2>
            <div id="boardList" class="board-list">
                <!-- Dynamically Rendered -->
            </div>
            <button class="btn-blue" onclick="saveNewBoardOrder()" style="width: 100%; margin-top: 15px;">Commit Position Ordering Changes</button>
        </div>

        <!-- Panel: Verification Queue -->
        <div class="panel full-width-panel">
            <h2>Mod Verification & System Ingestion Queue</h2>
            <div id="queueGrid" class="queue-grid">
                <!-- Dynamically Rendered -->
            </div>
        </div>

        <!-- Panel: Live Posts Asset Removal -->
        <div class="panel full-width-panel">
            <h2>Live Feed Active Post Audit</h2>
            <div id="liveGrid" class="queue-grid">
                <!-- Dynamically Rendered -->
            </div>
        </div>
    </div>

    <script>
        let currentCacheData = { boards: {}, posts: [], pendingPosts: [] };

        function getHeaders() {
            const pass = document.getElementById('adminPassword').value;
            return {
                'Content-Type': 'application/json',
                'x-admin-password': pass
            };
        }

        function showMessage(text, isError = false) {
            const box = document.getElementById('statusBox');
            box.textContent = text;
            box.className = `status-msg ${isError ? 'status-error' : 'status-success'}`;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }

        async function refreshAdminData() {
            try {
                const res = await fetch('/api/data', {
                    method: 'GET',
                    headers: getHeaders()
                });
                
                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.error || 'Server rejected authentication token credentials.');
                }

                currentCacheData = await res.json();
                renderBoards();
                renderPendingQueue();
                renderLiveFeed();
            } catch (err) {
                console.error(err);
                showMessage(err.message, true);
            }
        }

        function renderBoards() {
            const container = document.getElementById('boardList');
            container.innerHTML = '';

            const sortedBoards = Object.keys(currentCacheData.boards).sort((a, b) => {
                return currentCacheData.boards[a].position - currentCacheData.boards[b].position;
            });

            if (sortedBoards.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted)">No boards deployed on memory cache.</p>';
                return;
            }

            sortedBoards.forEach((key) => {
                const board = currentCacheData.boards[key];
                const div = document.createElement('div');
                div.className = 'board-item';
                div.setAttribute('data-key', key);
                div.innerHTML = `
                    <div class="board-info">
                        <strong>${board.title} (/${key})</strong>
                        <span class="board-meta">Type: ${board.type} | Position Layer index: ${board.position}</span>
                    </div>
                    <div class="board-actions">
                        <button class="btn-blue" onclick="moveBoard('${key}', -1)">↑</button>
                        <button class="btn-blue" onclick="moveBoard('${key}', 1)">↓</button>
                        <button class="btn-green" onclick="downloadBoardMedia('${key}')">📦 Get Zip</button>
                        <button class="btn-red" onclick="handleDeleteBoard('${key}')">Drop</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function moveBoard(key, direction) {
            const sorted = Object.keys(currentCacheData.boards).sort((a, b) => currentCacheData.boards[a].position - currentCacheData.boards[b].position);
            const index = sorted.indexOf(key);
            if (index === -1) return;

            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= sorted.length) return;

            // Swap position trackers
            const temp = sorted[index];
            sorted[index] = sorted[targetIndex];
            sorted[targetIndex] = temp;

            sorted.forEach((bKey, idx) => {
                currentCacheData.boards[bKey].position = idx;
            });

            renderBoards();
        }

        async function saveNewBoardOrder() {
            const sorted = Object.keys(currentCacheData.boards).sort((a, b) => currentCacheData.boards[a].position - currentCacheData.boards[b].position);
            try {
                const res = await fetch('/api/boards/reorder', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ order: sorted })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showMessage(data.message);
                refreshAdminData();
            } catch (err) {
                showMessage(err.message, true);
            }
        }

        async function handleCreateBoard(e) {
            e.preventDefault();
            const name = document.getElementById('boardName').value;
            const title = document.getElementById('boardTitle').value;
            const type = document.getElementById('boardType').value;

            try {
                const res = await fetch('/api/boards/create', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ name, title, type })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showMessage(data.message);
                document.getElementById('createBoardForm').reset();
                refreshAdminData();
            } catch (err) {
                showMessage(err.message, true);
            }
        }

        // --- FIXED FORWARD INGESTION FOR POST TYPE ROUTE DELETION BUG ---
        async function handleDeleteBoard(name) {
            if (!confirm(`Are you absolutely sure you want to drop standard category track /${name}? This will clean wipe all items inside it from system disks.`)) return;

            try {
                const res = await fetch('/api/boards/delete', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ name: name }) // Transmitting name inside JSON wrapper payload body block
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showMessage(data.message);
                refreshAdminData();
            } catch (err) {
                showMessage(err.message, true);
            }
        }

        function downloadBoardMedia(name) {
            const pass = document.getElementById('adminPassword').value;
            window.location.href = `/api/boards/download/${name}?x-admin-password=${encodeURIComponent(pass)}`;
            // Route reads query fallback params safely or you can hit route natively if verification pipeline checks credentials tokens
            const xhr = new XMLHttpRequest();
            xhr.open('GET', `/api/boards/download/${name}`);
            xhr.setRequestHeader('x-admin-password', pass);
            xhr.responseType = 'blob';
            xhr.onload = function () {
                if (xhr.status === 200) {
                    const blob = xhr.response;
                    const link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    link.download = `darkchan-board-${name}-export.zip`;
                    link.click();
                } else {
                    showMessage("Could not download archive stream package block container data.", true);
                }
            };
            xhr.send();
        }

        function renderPendingQueue() {
            const grid = document.getElementById('queueGrid');
            grid.innerHTML = '';

            if (currentCacheData.pendingPosts.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-muted); padding: 10px;">Queue workspace currently empty.</p>';
                return;
            }

            currentCacheData.pendingPosts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'queue-card';
                
                let mediaHtml = '';
                if (post.type === 'video') {
                    mediaHtml = `
                        <div class="media-container">
                            <span class="video-badge">VIDEO</span>
                            <img src="${post.thumbnail}" alt="Video placeholder">
                        </div>`;
                } else {
                    mediaHtml = `
                        <div class="media-container">
                            <img src="${post.src}" alt="Uploaded asset item">
                        </div>`;
                }

                card.innerHTML = `
                    ${mediaHtml}
                    <div class="card-details">
                        <div class="card-meta"><strong>ID:</strong> ${post.id}</div>
                        <div class="card-meta"><strong>Target Room:</strong> /${post.board}</div>
                        <div class="card-meta"><strong>Logged:</strong> ${new Date(post.timestamp).toLocaleTimeString()}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-green" onclick="moderatePost('${post.id}', 'approve')">Approve</button>
                        <button class="btn-red" onclick="moderatePost('${post.id}', 'deny')">Deny</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function moderatePost(id, action) {
            try {
                const res = await fetch('/api/posts/approve', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ id, action })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showMessage(data.message);
                refreshAdminData();
            } catch (err) {
                showMessage(err.message, true);
            }
        }

        function renderLiveFeed() {
            const grid = document.getElementById('liveGrid');
            grid.innerHTML = '';

            if (currentCacheData.posts.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-muted); padding: 10px;">No posts deployed to standard memory structures.</p>';
                return;
            }

            currentCacheData.posts.slice().reverse().forEach(post => {
                const card = document.createElement('div');
                card.className = 'queue-card';
                
                let mediaHtml = '';
                if (post.type === 'text') {
                    mediaHtml = `
                        <div class="media-container" style="background:#26262b; padding:15px; text-align:center; display:block; height:120px; overflow-y:auto; word-break:break-word;">
                            <span style="font-size:0.85rem; color:var(--text-main);">${post.message}</span>
                        </div>`;
                } else if (post.type === 'video') {
                    mediaHtml = `
                        <div class="media-container">
                            <span class="video-badge">VIDEO</span>
                            <img src="${post.thumbnail}" alt="Video raw data thumbnail asset wrapper placeholder">
                        </div>`;
                } else {
                    mediaHtml = `
                        <div class="media-container">
                            <img src="${post.src}" alt="Live graphic content frame data text description rendering">
                        </div>`;
                }

                card.innerHTML = `
                    ${mediaHtml}
                    <div class="card-details">
                        <div class="card-meta"><strong>ID:</strong> ${post.id}</div>
                        <div class="card-meta"><strong>Room:</strong> /${post.board}</div>
                        <div class="card-meta"><strong>Type:</strong> ${post.type}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-red" onclick="deleteLivePost('${post.id}')" style="width:100%">Purge from Disk</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function deleteLivePost(id) {
            if (!confirm("Are you sure you want to permanently strip this asset node from live structures?")) return;
            try {
                const res = await fetch('/api/posts/delete', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                showMessage(data.message);
                refreshAdminData();
            } catch (err) {
                showMessage(err.message, true);
            }
        }

        // Run data refresh cycle upon launch routine check
        window.addEventListener('DOMContentLoaded', () => {
            refreshAdminData();
        });
    </script>
</body>
</html>
