<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imageboard</title>
    <style>
        /* Base 4chan dark mode color palette */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1d1f21;
            color: #c5c8c6;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            padding: 5px;
        }
        a {
            color: #81a2be;
            text-decoration: none;
        }
        a:hover {
            color: #b2ccd6;
        }

        /* Top Board List Navigation Bar */
        .board-nav {
            font-size: 12px;
            border-bottom: 1px solid #282a2e;
            padding-bottom: 5px;
            margin-bottom: 15px;
            color: #969896;
        }
        .board-nav a {
            padding: 0 4px;
            font-weight: bold;
        }
        .board-nav .current-board {
            color: #cc6666;
            pointer-events: none;
        }

        /* Center Banner Header Title Area */
        .board-title-box {
            text-align: center;
            margin-bottom: 20px;
        }
        .board-title-box h1 {
            color: #cc6666;
            font-size: 24px;
            letter-spacing: -2px;
            margin-bottom: 4px;
        }
        .board-subtitle {
            font-size: 12px;
            color: #b294bb;
            font-style: italic;
        }

        /* Traditional Post Form Frame */
        .posting-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }
        .post-form {
            background-color: #282a2e;
            border: 1px solid #373b41;
            border-collapse: collapse;
            width: 100%;
            max-width: 500px;
        }
        .form-row {
            display: flex;
            border-bottom: 1px solid #373b41;
        }
        .form-row:last-child {
            border-bottom: none;
        }
        .form-label {
            background-color: #1d1f21;
            color: #b294bb;
            padding: 5px;
            font-weight: bold;
            font-size: 12px;
            width: 90px;
            border-right: 1px solid #373b41;
            display: flex;
            align-items: center;
        }
        .form-input-cell {
            padding: 4px;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }
        .form-input-cell input[type="file"] {
            color: #c5c8c6;
            font-size: 12px;
        }
        .submit-btn {
            background-color: #373b41;
            color: #c5c8c6;
            border: 1px solid #5f89ac;
            padding: 3px 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .submit-btn:hover {
            background-color: #282a2e;
        }

        /* Notification Banners */
        .status-banner {
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 12px;
        }

        /* Imageboard Thread List Layout definitions */
        .threads-feed {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .thread-container {
            background-color: #282a2e;
            border: 1px solid #373b41;
            padding: 10px;
            border-radius: 2px;
            display: block;
            overflow: hidden;
        }

        /* Post Block Architecture styling */
        .post-header {
            font-size: 12px;
            margin-bottom: 8px;
            color: #969896;
        }
        .poster-name {
            color: #b5bd68;
            font-weight: bold;
        }
        .post-id-tag {
            color: #de935f;
        }
        .file-info {
            font-size: 11px;
            color: #969896;
            margin-bottom: 8px;
        }

        /* Embedded Media Constraints */
        .media-render-frame {
            float: left;
            margin: 0 20px 10px 0;
            max-width: 250px;
            max-height: 250px;
            background-color: #1d1f21;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #373b41;
        }
        .media-render-frame img, .media-render-frame video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }
        
        /* Inline post text separation handling */
        .post-comment-body {
            color: #c5c8c6;
            word-wrap: break-word;
            line-height: 1.4;
            padding-top: 2px;
        }
        .clear-float {
            clear: both;
        }
        .empty-notice {
            text-align: center;
            color: #969896;
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- Target Top Navigation Dynamic Mount Link Root Node -->
    <div class="board-nav" id="topBoardNavbar">[ Loading Boards... ]</div>

    <!-- Active Structural Board Title Presentation Header Info -->
    <div class="board-title-box">
        <h1 id="activeBoardTitle">Select a Board</h1>
        <div class="board-subtitle" id="activeBoardSubtitle">Welcome to the network feed. Choose a room above to get started.</div>
    </div>

    <!-- Centralized File Input Form Block -->
    <div class="posting-container" id="submissionFormWrapper" style="display: none;">
        <form id="publicSubmissionForm" class="post-form">
            <div class="form-row">
                <div class="form-label">File</div>
                <div class="form-input-cell">
                    <input type="file" id="submissionMediaFile" accept="image/*,video/*" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-label">Action</div>
                <div class="form-input-cell">
                    <button type="submit" class="submit-btn">Submit Post</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Upload Progress Operations Alert Tracker -->
    <div class="status-banner" id="clientStatusBanner"></div>

    <!-- Primary Vertical Thread Display View Area -->
    <div class="threads-feed" id="imageboardThreadsFeed"></div>

    <script>
        let runtimeStateCache = { boards: {}, posts: [] };
        let activeBoardKey = "";

        // Fetch initialization content maps off global state tracking routes
        async function fetchSystemCatalog() {
            try {
                const res = await fetch('/api/public/data');
                if (!res.ok) throw new Error();
                runtimeStateCache = await res.json();
                
                generateNavbarLayout();
                
                // Automatically switch to the first available board index structure
                const boardKeys = Object.keys(runtimeStateCache.boards);
                if (boardKeys.length > 0) {
                    switchActiveBoardView(boardKeys[0]);
                } else {
                    renderEmptyWorkspaceNotification("No categories active on this server yet.");
                }
            } catch (err) {
                renderEmptyWorkspaceNotification("Unable to reach backend network registries.");
            }
        }

        // Output complete link set strings inside top dynamic navigation headers
        function generateNavbarLayout() {
            const navbar = document.getElementById('topBoardNavbar');
            navbar.innerHTML = '';
            
            const keys = Object.keys(runtimeStateCache.boards);
            if (keys.length === 0) {
                navbar.textContent = '[ No Active Boards Found ]';
                return;
            }

            navbar.appendChild(document.createTextNode('[ '));
            keys.forEach((key, index) => {
                const link = document.createElement('a');
                link.href = "#" + key;
                link.textContent = key;
                link.id = `nav-link-${key}`;
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    switchActiveBoardView(key);
                });
                
                navbar.appendChild(link);
                if (index < keys.length - 1) {
                    navbar.appendChild(document.createTextNode(' / '));
                }
            });
            navbar.appendChild(document.createTextNode(' ]'));
        }

        // Adjust global pointers and structural frame details during routing updates
        function switchActiveBoardView(boardKey) {
            if (!runtimeStateCache.boards[boardKey]) return;
            
            activeBoardKey = boardKey;
            
            // Toggle highlight styles across structural link anchors
            Object.keys(runtimeStateCache.boards).forEach(k => {
                const targetNode = document.getElementById(`nav-link-${k}`);
                if (targetNode) {
                    targetNode.className = (k === boardKey) ? 'current-board' : '';
                }
            });

            const currentBoard = runtimeStateCache.boards[boardKey];
            document.getElementById('activeBoardTitle').textContent = `/${boardKey}/ - ${currentBoard.title}`;
            document.getElementById('activeBoardSubtitle').textContent = `File Format Filter Scope: ${currentBoard.type.toUpperCase()}`;
            
            // Reveal upload control tools
            document.getElementById('submissionFormWrapper').style.display = 'flex';
            document.getElementById('clientStatusBanner').textContent = '';

            renderFilterFeedView();
        }

        // Filter and paint matching dataset nodes into vertical thread lists
        function renderFilterFeedView() {
            const feedContainer = document.getElementById('imageboardThreadsFeed');
            feedContainer.innerHTML = '';

            // Pull only items paired to the chosen handle pointer location
            const matchedItems = (runtimeStateCache.posts || []).filter(p => p.board === activeBoardKey);

            if (matchedItems.length === 0) {
                feedContainer.innerHTML = '<div class="empty-notice">There are no posts here. Be the first to start a thread.</div>';
                return;
            }

            // Loop items in structural reverse order to place newest posts on top
            for (let i = matchedItems.length - 1; i >= 0; i--) {
                const post = matchedItems[i];

                const threadBox = document.createElement('div');
                threadBox.className = 'thread-container';

                const postHeader = document.createElement('div');
                postHeader.className = 'post-header';
                postHeader.innerHTML = `
                    <span class="poster-name">Anonymous</span> 
                    <span>No.</span> <span class="post-id-tag">${post.id}</span>
                `;

                // Handle string slice metrics extraction for readable track tags
                const fileNameClean = post.src.split('/').pop();
                const fileLinkBox = document.createElement('div');
                fileLinkBox.className = 'file-info';
                fileLinkBox.innerHTML = `File: <a href="${post.src}" target="_blank">${fileNameClean}</a> (${post.type})`;

                const mediaBox = document.createElement('div');
                mediaBox.className = 'media-render-frame';

                if (post.type === 'video') {
                    const video = document.createElement('video');
                    video.src = post.src;
                    video.controls = true;
                    video.preload = 'metadata';
                    mediaBox.appendChild(video);
                } else {
                    const img = document.createElement('img');
                    img.src = post.src;
                    mediaBox.appendChild(img);
                }

                const textComment = document.createElement('div');
                textComment.className = 'post-comment-body';
                textComment.textContent = `File asset content successfully mirrored live directly to collection grid board /${post.board}/ index position.`;

                const layoutBreak = document.createElement('div');
                layoutBreak.className = 'clear-float';

                threadBox.appendChild(postHeader);
                threadBox.appendChild(fileLinkBox);
                threadBox.appendChild(mediaBox);
                threadBox.appendChild(textComment);
                threadBox.appendChild(layoutBreak);

                feedContainer.appendChild(threadBox);
            }
        }

        // Standard dynamic fallbacks for error or blank states
        function renderEmptyWorkspaceNotification(msgText) {
            document.getElementById('imageboardThreadsFeed').innerHTML = `<div class="empty-notice">${msgText}</div>`;
            document.getElementById('submissionFormWrapper').style.display = 'none';
        }

        // Form interception delivery transaction processing handlers
        document.getElementById('publicSubmissionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('submissionMediaFile');
            const statusBox = document.getElementById('clientStatusBanner');

            if (!activeBoardKey) {
                alert("Target board context reference missing.");
                return;
            }
            if (fileInput.files.length === 0) {
                alert("Please pick a media file before submitting.");
                return;
            }

            const payloadData = new FormData();
            payloadData.append('board', activeBoardKey);
            payloadData.append('media', fileInput.files[0]);

            statusBox.style.color = '#81a2be';
            statusBox.textContent = 'Uploading file asset to confirmation queue...';

            try {
                const res = await fetch('/api/public/upload', {
                    method: 'POST',
                    body: payloadData
                });
                
                const outcome = await res.json();
                if (res.ok && outcome.success) {
                    statusBox.style.color = '#b5bd68';
                    statusBox.textContent = outcome.message || 'File uploaded successfully and is awaiting admin approval.';
                    document.getElementById('publicSubmissionForm').reset();
                } else {
                    statusBox.style.color = '#cc6666';
                    statusBox.textContent = outcome.error || 'The server rejected this submission.';
                }
            } catch (err) {
                statusBox.style.color = '#cc6666';
                statusBox.textContent = 'Connection timeout running submission tasks.';
            }
        });

        // Fire initialization load sequences
        fetchSystemCatalog();
    </script>
</body>
</html>
