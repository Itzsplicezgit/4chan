<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkChan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ffffff;
            font-size: 26px;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
            border-bottom: 2px solid #2d2d2d;
            padding-bottom: 10px;
        }
        h2 {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: bold;
        }
        a {
            color: #ffffff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .section-wrapper {
            background-color: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .grid-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-layout { grid-template-columns: 1fr; }
        }
        
        /* Board Selection List Styles */
        .board-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .board-item-link {
            display: block;
            padding: 10px;
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            color: #ffffff !important;
            font-weight: bold;
            transition: background 0.15s;
        }
        .board-item-link:hover, .board-item-link.active {
            background: #3d3d3d;
            border-color: #ffffff;
            text-decoration: none;
        }
        .board-item-link span {
            font-size: 11px;
            color: #aaaaaa;
            display: block;
            font-weight: normal;
            margin-top: 2px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: #aaaaaa;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            color: #ffffff;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #ffffff;
        }
        
        /* Custom Upload Styling Wrapper */
        .custom-file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .custom-file-upload input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .file-upload-btn {
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            color: #ffffff;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            display: block;
            transition: background 0.15s;
        }
        .custom-file-upload:hover .file-upload-btn {
            background: #3d3d3d;
            border-color: #aaaaaa;
        }
        .file-chosen-text {
            margin-top: 5px;
            font-size: 12px;
            color: #aaaaaa;
            font-style: italic;
        }

        button[type="submit"] {
            background: #ffffff;
            color: #121212;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.15s;
            margin-top: 5px;
        }
        button[type="submit"]:hover { 
            opacity: 0.9;
        }

        /* Interactive Feed View Layout */
        .feed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        
        /* Dynamic Placeholder to preserve scroll tracking layout height when culled */
        .feed-card {
            background: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 260px; 
            transition: border-color 0.15s;
        }
        .feed-card.active-view {
            border-color: #3d3d3d;
        }
        .media-container {
            width: 100%;
            height: 200px;
            background: #121212;
            border-bottom: 1px solid #2d2d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .media-container img, .media-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .card-meta {
            padding: 12px;
            font-size: 12px;
            color: #aaaaaa;
            margin-top: auto;
        }
        .card-meta span {
            color: #ffffff;
            font-weight: bold;
        }

        /* Progress Utilities */
        .progress-box {
            display: none;
            margin-top: 12px;
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            overflow: hidden;
            height: 20px;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: #ffffff;
            width: 0%;
        }
        .progress-indicator-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            left: 0;
            font-size: 12px;
            line-height: 18px;
            font-weight: bold;
            color: #121212;
        }
        .status-msg {
            margin-top: 12px;
            font-size: 13px;
            white-space: pre-line;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DarkChan</h1>

        <div class="grid-layout">
            
            <!-- Left Panel: Alphabetical Navigation List -->
            <div class="sidebar-pane">
                <div class="section-wrapper">
                    <h2>Select a Board</h2>
                    <ul class="board-list" id="alphabeticalBoardContainer">
                        <!-- Sorted items inject asynchronously here -->
                        <li style="color:#aaaaaa; font-style:italic; padding:10px;">Loading Boards...</li>
                    </ul>
                </div>
            </div>

            <!-- Right Panel: Main Dashboard Feed & Dynamic Submission -->
            <div class="main-content-pane">
                
                <!-- Dynamic Post Submission Panel -->
                <div class="section-wrapper" id="uploadSubmissionPanel">
                    <h2>Submit Media Content</h2>
                    <form id="publicSubmissionForm">
                        <div class="grid-layout" style="grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 0;">
                            <div class="form-group">
                                <label for="submitTargetBoard">Target Destination Board</label>
                                <select id="submitTargetBoard" required>
                                    <option value="">Select Target...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Upload Media File</label>
                                <div class="custom-file-upload">
                                    <span class="file-upload-btn" id="customFileBtnText">Choose Image / Video</span>
                                    <input type="file" id="publicMediaFile" accept="image/*,video/*" required>
                                </div>
                                <div class="file-chosen-text" id="fileChosenFeedback">No file selected</div>
                            </div>
                        </div>
                        <button type="submit">Submit to Moderation Queue</button>
                    </form>

                    <div class="progress-box" id="submissionProgressBox">
                        <div class="progress-fill" id="submissionProgressFill"></div>
                        <div class="progress-indicator-text" id="submissionProgressText">0%</div>
                    </div>
                    <div class="status-msg" id="submissionStatusMsg"></div>
                </div>

                <!-- Feed Output Section -->
                <div class="section-wrapper">
                    <h2 id="currentFeedTitle">Global Shared Feed</h2>
                    <div class="feed-grid" id="mainDynamicFeedGrid">
                        <!-- Feed grid elements load natively here -->
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        let localStateCache = { boards: {}, posts: [] };
        let activeBoardFilter = null;
        let elementsToObserve = [];

        // Track file inputs to update custom text interface values
        document.getElementById('publicMediaFile').addEventListener('change', function(e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : 'No file selected';
            document.getElementById('fileChosenFeedback').textContent = fileName;
        });

        // Initialize state engine data sync
        async function loadPlatformState() {
            try {
                const res = await fetch('/api/public/data');
                if (!res.ok) throw new Error("Data retrieval bad sequence");
                localStateCache = await res.json();
                
                renderAlphabeticalNavigation();
                populateUploadSelector();
                renderDynamicMediaFeed();
            } catch (err) {
                console.error("Critical fallback interface sync aborted:", err);
            }
        }

        // Alphabetically sort keys and render as lists
        function renderAlphabeticalNavigation() {
            const listContainer = document.getElementById('alphabeticalBoardContainer');
            listContainer.innerHTML = '';

            const sortedBoardKeys = Object.keys(localStateCache.boards).sort((a, b) => a.localeCompare(b));

            if(sortedBoardKeys.length === 0) {
                listContainer.innerHTML = '<li style="color:#aaaaaa; font-style:italic; padding:10px;">No boards found.</li>';
                return;
            }

            sortedBoardKeys.forEach(key => {
                const boardInfo = localStateCache.boards[key];
                
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = "#";
                a.className = `board-item-link ${activeBoardFilter === key ? 'active' : ''}`;
                a.innerHTML = `/${key}/ <span>${boardInfo.title}</span>`;
                
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.board-item-link').forEach(el => el.classList.remove('active'));
                    if (activeBoardFilter === key) {
                        activeBoardFilter = null;
                        document.getElementById('currentFeedTitle').textContent = "Global Shared Feed";
                    } else {
                        activeBoardFilter = key;
                        a.classList.add('active');
                        document.getElementById('currentFeedTitle').textContent = `Feed Context: /${key}/`;
                    }
                    renderDynamicMediaFeed();
                });

                li.appendChild(a);
                listContainer.appendChild(li);
            });
        }

        function populateUploadSelector() {
            const selector = document.getElementById('submitTargetBoard');
            selector.innerHTML = '<option value="">Select Target...</option>';
            
            Object.keys(localStateCache.boards).sort().forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = `/${key}/ - ${localStateCache.boards[key].title}`;
                selector.appendChild(opt);
            });
        }

        // Main interface engine for dynamic element rendering/culling (prevents page lag)
        function renderDynamicMediaFeed() {
            const grid = document.getElementById('mainDynamicFeedGrid');
            grid.innerHTML = '';
            
            mediaIntersectionObserver.disconnect();

            const targetItems = localStateCache.posts.filter(post => {
                return !activeBoardFilter || post.board === activeBoardFilter;
            });

            if (targetItems.length === 0) {
                grid.innerHTML = '<div style="color:#aaaaaa; font-style:italic; padding:10px; grid-column:1/-1;">No published assets matches this feed context.</div>';
                return;
            }

            targetItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'feed-card';
                card.dataset.id = item.id;
                card.dataset.src = item.src;
                card.dataset.type = item.type;

                const mediaBox = document.createElement('div');
                mediaBox.className = 'media-container';
                card.appendChild(mediaBox);

                const meta = document.createElement('div');
                meta.className = 'card-meta';
                meta.innerHTML = `ID: <span>${item.id}</span> inside <span>/${item.board}/</span>`;
                card.appendChild(meta);

                grid.appendChild(card);
                mediaIntersectionObserver.observe(card);
            });
        }

        // Intersection Observer Core Configuration: Unloads assets out of visual range
        const mediaIntersectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const card = entry.target;
                const mediaBox = card.querySelector('.media-container');
                const src = card.dataset.src;
                const type = card.dataset.type;

                if (entry.isIntersecting) {
                    card.classList.add('active-view');
                    if (mediaBox.children.length === 0) {
                        if (type === 'video') {
                            const video = document.createElement('video');
                            video.src = src;
                            video.controls = true;
                            video.preload = 'metadata';
                            mediaBox.appendChild(video);
                        } else {
                            const img = document.createElement('img');
                            img.src = src;
                            mediaBox.appendChild(img);
                        }
                    }
                } else {
                    card.classList.remove('active-view');
                    mediaBox.innerHTML = '';
                }
            });
        }, {
            root: null,
            rootMargin: '300px 0px 300px 0px',
            threshold: 0.01
        });

        // Form handler routine submission to moderation pipeline
        document.getElementById('publicSubmissionForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const board = document.getElementById('submitTargetBoard').value;
            const fileInput = document.getElementById('publicMediaFile').files[0];
            const statusMsg = document.getElementById('submissionStatusMsg');
            const progBox = document.getElementById('submissionProgressBox');
            const progFill = document.getElementById('submissionProgressFill');
            const progText = document.getElementById('submissionProgressText');

            if (!board || !fileInput) return;

            const formData = new FormData();
            formData.append('board', board);
            formData.append('media', fileInput);

            statusMsg.textContent = '';
            progBox.style.display = 'block';
            progFill.style.width = '0%';
            progText.textContent = '0%';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/public/upload', true);

            xhr.upload.addEventListener('progress', (event) => {
                if (event.lengthComputable) {
                    const pct = Math.round((event.loaded / event.total) * 100);
                    progFill.style.width = pct + '%';
                    progText.textContent = pct + '%';
                }
            });

            xhr.onload = function () {
                progBox.style.display = 'none';

                if (xhr.status === 200) {
                    statusMsg.style.color = '#ffffff';
                    statusMsg.textContent = 'Post submitted into queue for admin approval validation.';
                    document.getElementById('publicSubmissionForm').reset();
                    document.getElementById('fileChosenFeedback').textContent = 'No file selected';
                } else {
                    try {
                        const errData = JSON.parse(xhr.responseText);
                        statusMsg.style.color = '#ffffff';
                        
                        // Parse numbers out of server message to format into time strings (MM:SS)
                        if (xhr.status === 429 && errData.error) {
                            const match = errData.error.match(/\d+/);
                            if (match) {
                                const totalSeconds = parseInt(match[0], 10);
                                const mins = Math.floor(totalSeconds / 60);
                                const secs = totalSeconds % 60;
                                const formattedTime = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                                statusMsg.textContent = `Please wait ${formattedTime} until next upload`;
                            } else {
                                statusMsg.textContent = errData.error;
                            }
                        } else {
                            statusMsg.textContent = errData.error || 'Server error processing queue ingestion.';
                        }
                    } catch(e) {
                        statusMsg.style.color = '#ffffff';
                        statusMsg.textContent = 'Error processing upload parameters.';
                    }
                }
            };

            xhr.onerror = function() {
                progBox.style.display = 'none';
                statusMsg.style.color = '#ffffff';
                statusMsg.textContent = 'Network error occurred during execution.';
            };

            xhr.send(formData);
        });

        window.addEventListener('DOMContentLoaded', loadPlatformState);
    </script>
</body>
</html>
