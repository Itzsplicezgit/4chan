<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkChan</title>
    <style>
        :root {
            --bg-primary: #121214;
            --bg-secondary: #1a1a1e;
            --bg-tertiary: #26262b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #374151;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar styling */
        .sidebar {
            width: 260px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .board-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .board-btn {
            width: 100%;
            padding: 12px 16px;
            background: none;
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-muted);
            text-align: left;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .board-btn:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-main);
        }

        .board-btn.active {
            background-color: var(--accent);
            color: white;
        }

        .board-type-tag {
            font-size: 0.75rem;
            padding: 2px 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* Main Content View */
        .main-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg-primary);
        }

        .view-header {
            padding: 20px 40px;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-header h1 {
            font-size: 1.5rem;
        }

        .feed-container {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        /* Media Grid System */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .media-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
            overflow: hidden;
            cursor: pointer;
        }

        .media-wrapper img, .media-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Lazy video wrapper styling */
        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0c0c0e;
        }

        .play-button-overlay {
            width: 50px;
            height: 50px;
            background-color: rgba(99, 102, 241, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transition: transform 0.2s ease;
            z-index: 2;
        }

        .card:hover .play-button-overlay {
            transform: scale(1.1);
        }

        .play-button-overlay::after {
            content: '';
            box-sizing: border-box;
            width: 0;
            height: 14px;
            border-style: solid;
            border-width: 7px 0 7px 12px;
            border-color: transparent transparent transparent white;
            margin-left: 3px;
        }

        .card-footer {
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            background-color: rgba(0,0,0,0.1);
        }

        /* Form upload interface panels */
        .submission-panel {
            background-color: var(--bg-secondary);
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .file-input-label {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .file-input-label:hover {
            background-color: var(--border);
        }

        .hidden-file {
            display: none;
        }

        .submit-btn {
            margin-top: 15px;
            padding: 10px 24px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Chat view workspace styling */
        .chat-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .chat-history {
            flex-grow: 1;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px 12px 0 0;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-bubble {
            background-color: var(--bg-tertiary);
            padding: 12px 16px;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            max-width: 80%;
            align-self: flex-start;
            border: 1px solid var(--border);
            word-break: break-word;
        }

        .chat-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: block;
        }

        .chat-text {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .chat-input-bar {
            display: flex;
            gap: 10px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-top: none;
            padding: 15px;
            border-radius: 0 0 12px 12px;
        }

        .chat-field {
            flex-grow: 1;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            outline: none;
            font-size: 0.95rem;
        }

        .chat-field:focus {
            border-color: var(--accent);
        }

        .chat-send-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            cursor: pointer;
            font-weight: 500;
        }

        .chat-send-btn:hover {
            background-color: var(--accent-hover);
        }

        .status-message {
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.9rem;
            display: none;
        }

        .status-error { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.4); }
        .status-success { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>DarkChan Boards</h2>
        <ul class="board-list" id="boardListContainer"></ul>
    </div>

    <div class="main-view">
        <div class="view-header">
            <h1 id="activeBoardTitle">Loading Feeds...</h1>
        </div>
        <div class="feed-container" id="feedContentArea"></div>
    </div>

    <script>
        let currentBoard = 'all';
        let appData = { boards: {}, boardOrder: [], posts: [] };

        async function fetchState() {
            try {
                const response = await fetch('/api/data');
                appData = await response.json();
                renderSidebar();
                renderMainView();
            } catch (err) {
                console.error("System storage sync failure:", err);
            }
        }

        function renderSidebar() {
            const container = document.getElementById('boardListContainer');
            container.innerHTML = '';

            const orderLoop = (appData.boardOrder && appData.boardOrder.length > 0) 
                ? appData.boardOrder 
                : Object.keys(appData.boards);

            orderLoop.forEach(key => {
                const board = appData.boards[key];
                if (!board) return;

                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = `board-btn ${currentBoard === key ? 'active' : ''}`;
                
                const titleSpan = document.createElement('span');
                titleSpan.textContent = board.title;
                btn.appendChild(titleSpan);

                if(board.type) {
                    const typeTag = document.createElement('span');
                    typeTag.className = 'board-type-tag';
                    typeTag.textContent = board.type;
                    btn.appendChild(typeTag);
                }

                btn.onclick = () => {
                    currentBoard = key;
                    renderSidebar();
                    renderMainView();
                };
                li.appendChild(btn);
                container.appendChild(li);
            });
        }

        function renderMainView() {
            const headerTitle = document.getElementById('activeBoardTitle');
            const contentArea = document.getElementById('feedContentArea');
            contentArea.innerHTML = '';

            const boardConfig = appData.boards[currentBoard];
            if (!boardConfig) {
                headerTitle.textContent = "Unknown Board Element";
                return;
            }

            headerTitle.textContent = boardConfig.title;

            if (boardConfig.type === 'chat') {
                renderChatWorkspace(contentArea);
            } else {
                renderMediaWorkspace(contentArea);
            }
        }

        function renderChatWorkspace(targetContainer) {
            const layout = document.createElement('div');
            layout.className = 'chat-layout';

            const history = document.createElement('div');
            history.className = 'chat-history';

            const filteredChats = appData.posts.filter(p => p.board === currentBoard && p.type === 'chat');

            filteredChats.forEach(chat => {
                const bubble = document.createElement('div');
                bubble.className = 'chat-bubble';

                const meta = document.createElement('span');
                meta.className = 'chat-meta';
                meta.textContent = new Date(chat.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                const text = document.createElement('div');
                text.className = 'chat-text';
                text.textContent = chat.message;

                bubble.appendChild(meta);
                bubble.appendChild(text);
                history.appendChild(bubble);
            });

            const inputBar = document.createElement('div');
            inputBar.className = 'chat-input-bar';

            const txtField = document.createElement('input');
            txtField.type = 'text';
            txtField.className = 'chat-field';
            txtField.placeholder = 'Type a message... (1 min cooldown applies)';
            txtField.maxLength = 500;

            const sendBtn = document.createElement('button');
            sendBtn.className = 'chat-send-btn';
            sendBtn.textContent = 'Send';

            const status = document.createElement('div');
            status.className = 'status-message';

            async function dispatchMessage() {
                const msg = txtField.value.trim();
                if(!msg) return;

                try {
                    const res = await fetch('/api/posts/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ board: currentBoard, message: msg })
                    });
                    const data = await res.json();
                    if(data.success) {
                        txtField.value = '';
                        status.style.display = 'none';
                        await fetchState();
                    } else {
                        status.textContent = data.error || 'Failed to deliver message.';
                        status.className = 'status-message status-error';
                        status.style.display = 'block';
                    }
                } catch(e) {
                    status.textContent = 'Network communication failure error.';
                    status.className = 'status-message status-error';
                    status.style.display = 'block';
                }
            }

            txtField.onkeydown = (e) => { if(e.key === 'Enter') dispatchMessage(); };
            sendBtn.onclick = dispatchMessage;

            inputBar.appendChild(txtField);
            inputBar.appendChild(sendBtn);

            layout.appendChild(history);
            layout.appendChild(inputBar);
            layout.appendChild(status);
            targetContainer.appendChild(layout);

            history.scrollTop = history.scrollHeight;
        }

        function renderMediaWorkspace(targetContainer) {
            // Render regular file submission drop block
            const panel = document.createElement('div');
            panel.className = 'submission-panel';
            panel.innerHTML = `
                <h3>Submit Content to Feed Matrix</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top:5px;">Images or Videos. Cooldown enforced on post execution.</p>
                <label class="file-input-label" for="userFileInput">Choose File Resource</label>
                <input type="file" id="userFileInput" class="hidden-file" accept="image/*,video/*" />
                <div id="fileSelectionName" style="margin-top: 10px; font-size:0.85rem; color:var(--accent);"></div>
                <button class="submit-btn" id="fileSubmitBtn" style="display:none;">Upload to Moderation Queue</button>
                <div id="uploadStatusBox" class="status-message"></div>
            `;
            targetContainer.appendChild(panel);

            const fileInput = panel.querySelector('#userFileInput');
            const selectionName = panel.querySelector('#fileSelectionName');
            const submitBtn = panel.querySelector('#fileSubmitBtn');
            const statusBox = panel.querySelector('#uploadStatusBox');

            fileInput.onchange = () => {
                if(fileInput.files.length > 0) {
                    selectionName.textContent = `Target item: ${fileInput.files[0].name}`;
                    submitBtn.style.display = 'inline-block';
                }
            };

            submitBtn.onclick = async () => {
                const payload = new FormData();
                payload.append('board', currentBoard);
                payload.append('media', fileInput.files[0]);

                try {
                    statusBox.style.display = 'none';
                    const res = await fetch('/api/posts/submit', { method: 'POST', body: payload });
                    const data = await res.json();
                    if(data.success) {
                        statusBox.textContent = data.message;
                        statusBox.className = 'status-message status-success';
                        statusBox.style.display = 'block';
                        fileInput.value = '';
                        selectionName.textContent = '';
                        submitBtn.style.display = 'none';
                    } else {
                        statusBox.textContent = data.error || 'Processing registration rejected.';
                        statusBox.className = 'status-message status-error';
                        statusBox.style.display = 'block';
                    }
                } catch(err) {
                    statusBox.textContent = 'Server communication fault.';
                    statusBox.className = 'status-message status-error';
                    statusBox.style.display = 'block';
                }
            };

            // Render Media Feed Grid Component
            const grid = document.createElement('div');
            grid.className = 'media-grid';

            const filteredPosts = appData.posts.filter(p => (currentBoard === 'all' && p.type !== 'chat') || p.board === currentBoard);

            filteredPosts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'card';

                const wrapper = document.createElement('div');
                wrapper.className = 'media-wrapper';

                if (post.type === 'video') {
                    // Optimized video container wrapper logic: loads zero video stream resources until clicked
                    const placeholder = document.createElement('div');
                    placeholder.className = 'video-placeholder';
                    
                    const playOverlay = document.createElement('div');
                    playOverlay.className = 'play-button-overlay';
                    
                    placeholder.appendChild(playOverlay);
                    wrapper.appendChild(placeholder);

                    // Initialize actual video configuration stream layout only upon interaction click event
                    wrapper.onclick = () => {
                        wrapper.onclick = null; // Remove handler to prevent re-execution loop
                        wrapper.innerHTML = '';
                        const video = document.createElement('video');
                        video.src = post.src;
                        video.controls = true;
                        video.autoplay = true;
                        video.style.position = 'absolute';
                        video.style.width = '100%';
                        video.style.height = '100%';
                        wrapper.appendChild(video);
                    };
                } else {
                    const img = document.createElement('img');
                    img.src = post.src;
                    img.loading = 'lazy';
                    wrapper.appendChild(img);
                }

                const footer = document.createElement('div');
                footer.className = 'card-footer';
                footer.textContent = `Node Asset Ref: ${post.id} • ${new Date(post.timestamp).toLocaleDateString()}`;

                card.appendChild(wrapper);
                card.appendChild(footer);
                grid.appendChild(card);
            });

            targetContainer.appendChild(grid);
        }

        window.onload = () => {
            fetchState();
            // Optional continuous feed checking interval execution
            setInterval(fetchState, 10000);
        };
    </script>
</body>
</html>
