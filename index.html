<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer Platform</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #111;
            color: #fff;
            min-height: 100vh;
        }
        header {
            background: #1a1a1a;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        select, button {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: background 0.2s;
        }
        select:hover, button:hover {
            background: #3a3a3a;
        }
        .submit-btn {
            background: #0070f3;
            border-color: #0070f3;
        }
        .submit-btn:hover {
            background: #0051a8;
        }
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
        }
        .media-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }
        .media-container img, .media-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .card-info {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
        }
        .post-id {
            color: #888;
            font-size: 0.85rem;
            font-family: monospace;
        }
        /* User Upload Modal Styling */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #333;
            width: 100%;
            max-width: 500px;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #888;
            cursor: pointer;
        }
        .close-modal:hover {
            color: #fff;
        }
        .modal h2 {
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #ccc;
        }
        .form-group select, .form-group input[type="file"] {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 0.6rem;
            border-radius: 6px;
            color: #fff;
        }
        .progress-container {
            display: none;
            margin-top: 1rem;
            background: #2a2a2a;
            border-radius: 6px;
            overflow: hidden;
            height: 20px;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            background: #0070f3;
            width: 0%;
            transition: width 0.1s linear;
        }
        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            left: 0;
            font-size: 0.8rem;
            line-height: 20px;
            font-weight: bold;
        }
        .status-message {
            margin-top: 1rem;
            font-size: 0.9rem;
            text-align: center;
        }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Media Platform</h1>
        <div class="header-actions">
            <select id="boardSelector">
                <option value="">Loading Boards...</option>
            </select>
            <button class="submit-btn" id="openUploadBtn">Submit Media</button>
        </div>
    </header>

    <div class="container">
        <div class="grid" id="mediaGrid">
            <!-- Dynamic Post Cards Render Here -->
        </div>
    </div>

    <!-- User Upload Submission Modal -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <button class="close-modal" id="closeUploadBtn">&times;</button>
            <h2>Submit Content for Approval</h2>
            <form id="submissionForm">
                <div class="form-group">
                    <label for="submitBoardSelector">Select Destination Board</label>
                    <select id="submitBoardSelector" required>
                        <!-- Dynamic options loaded from database structural state -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="mediaFiles">Choose Files (Images or Videos)</label>
                    <input type="file" id="mediaFiles" accept="image/*,video/*" multiple required>
                </div>
                <button type="submit" class="submit-btn" style="width: 100%; margin-top: 0.5rem;">Upload Submissions</button>
            </form>

            <div class="progress-container" id="uploadProgressContainer">
                <div class="progress-bar" id="uploadProgressBar"></div>
                <div class="progress-text" id="uploadProgressText">0%</div>
            </div>
            <div class="status-message" id="statusMessage"></div>
        </div>
    </div>

    <script>
        let globalData = { boards: {}, posts: [] };

        // Fetch initialization infrastructure state
        async function loadContent() {
            try {
                const res = await fetch('/api/data');
                if (!res.ok) throw new Error('Failed to retrieve application index dataset.');
                globalData = await res.json();
                
                populateBoardSelectors();
                renderActiveGrid();
            } catch (err) {
                console.error(err);
                document.getElementById('mediaGrid').innerHTML = `<div class="empty-state" style="color: #ff4a4a;">Failed to load system feeds. Check your connection.</div>`;
            }
        }

        // Keep dropdown controls up to date with live categories
        function populateBoardSelectors() {
            const boardSelector = document.getElementById('boardSelector');
            const submitBoardSelector = document.getElementById('submitBoardSelector');
            
            const currentSelection = boardSelector.value;
            
            boardSelector.innerHTML = '<option value="">All Boards</option>';
            submitBoardSelector.innerHTML = '';

            const boardKeys = Object.keys(globalData.boards);

            if (boardKeys.length === 0) {
                submitBoardSelector.innerHTML = '<option value="">No boards available</option>';
                return;
            }

            boardKeys.forEach(key => {
                const board = globalData.boards[key];
                
                const opt1 = document.createElement('option');
                opt1.value = key;
                opt1.textContent = board.title;
                boardSelector.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = key;
                opt2.textContent = board.title;
                submitBoardSelector.appendChild(opt2);
            });

            if (Object.keys(globalData.boards).includes(currentSelection)) {
                boardSelector.value = currentSelection;
            }
        }

        // Render current live feed filtered down by category
        function renderActiveGrid() {
            const grid = document.getElementById('mediaGrid');
            const targetBoard = document.getElementById('boardSelector').value;
            grid.innerHTML = '';

            // Filter out items matching target board parameter
            const filteredPosts = targetBoard 
                ? globalData.posts.filter(p => p.board === targetBoard)
                : globalData.posts;

            if (filteredPosts.length === 0) {
                grid.innerHTML = '<div class="empty-state">No active media elements found on this board.</div>';
                return;
            }

            // Generate clean structural cards
            filteredPosts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'card';

                const mediaContainer = document.createElement('div');
                mediaContainer.className = 'media-container';

                if (post.type === 'video') {
                    const video = document.createElement('video');
                    video.src = post.src;
                    video.controls = true;
                    video.preload = 'metadata';
                    mediaContainer.appendChild(video);
                } else {
                    const img = document.createElement('img');
                    img.src = post.src;
                    img.loading = 'lazy';
                    mediaContainer.appendChild(img);
                }

                const cardInfo = document.createElement('div');
                cardInfo.className = 'card-info';
                
                const idSpan = document.createElement('span');
                idSpan.className = 'post-id';
                idSpan.textContent = `ID: ${post.id}`;
                
                cardInfo.appendChild(idSpan);
                card.appendChild(mediaContainer);
                card.appendChild(cardInfo);
                grid.appendChild(card);
            });
        }

        // Modal visibility toggle state tracking listeners
        const uploadModal = document.getElementById('uploadModal');
        const openUploadBtn = document.getElementById('openUploadBtn');
        const closeUploadBtn = document.getElementById('closeUploadBtn');
        const submissionForm = document.getElementById('submissionForm');
        const statusMessage = document.getElementById('statusMessage');
        const progressContainer = document.getElementById('uploadProgressContainer');
        const progressBar = document.getElementById('uploadProgressBar');
        const progressText = document.getElementById('uploadProgressText');

        openUploadBtn.addEventListener('click', () => {
            uploadModal.style.display = 'flex';
            statusMessage.textContent = '';
            progressContainer.style.display = 'none';
            submissionForm.reset();
        });

        closeUploadBtn.addEventListener('click', () => {
            uploadModal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === uploadModal) uploadModal.style.display = 'none';
        });

        // Track custom submission process via AJAX XMLHttpRequest with live tracking bars
        submissionForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const board = document.getElementById('submitBoardSelector').value;
            const files = document.getElementById('mediaFiles').files;

            if (!board) {
                statusMessage.style.color = '#ff4a4a';
                statusMessage.textContent = 'Please choose a target board asset category first.';
                return;
            }

            const formData = new FormData();
            formData.append('board', board);
            for (let i = 0; i < files.length; i++) {
                formData.append('media', files[i]);
            }

            statusMessage.textContent = '';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressText.textContent = '0%';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/posts/submit', true);

            xhr.upload.addEventListener('progress', (event) => {
                if (event.lengthComputable) {
                    const percentComplete = Math.round((event.loaded / event.total) * 100);
                    progressBar.style.width = percentComplete + '%';
                    progressText.textContent = percentComplete + '%';
                }
            });

            xhr.onload = function () {
                if (xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    statusMessage.style.color = '#4caf50';
                    statusMessage.textContent = response.message || 'Submitted successfully!';
                    submissionForm.reset();
                    
                    // Automatically wrap up operation close sequence after delay window
                    setTimeout(() => {
                        uploadModal.style.display = 'none';
                    }, 2000);
                } else {
                    const errorResponse = JSON.parse(xhr.responseText);
                    statusMessage.style.color = '#ff4a4a';
                    statusMessage.textContent = errorResponse.error || 'An operational upload failure has triggered.';
                }
            };

            xhr.onerror = function () {
                statusMessage.style.color = '#ff4a4a';
                statusMessage.textContent = 'Network connectivity processing exception encountered.';
            };

            xhr.send(formData);
        });

        // Event filter watcher hook routing setup
        document.getElementById('boardSelector').addEventListener('change', renderActiveGrid);

        // Initial system paint run step execution hook
        loadContent();
    </script>
</body>
</html>
