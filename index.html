<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkChan</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --accent-color: #00ADB5;
            --text-color: #EEEEEE;
            --muted-text: #888888;
            --border-color: #333333;
            --cooldown-color: #FF5722;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        .layout-container {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .layout-container {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar Navigation */
        aside {
            background-color: var(--container-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            height: fit-content;
        }

        aside h2 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: var(--muted-text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .board-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .board-item {
            padding: 10px;
            background: #252525;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, border 0.2s;
            border: 1px solid transparent;
            font-weight: 500;
        }

        .board-item:hover {
            background: #2a2a2a;
        }

        .board-item.active {
            background: rgba(0, 173, 181, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .board-type-tag {
            font-size: 0.7rem;
            background: #333;
            color: #ccc;
            padding: 2px 6px;
            border-radius: 4px;
            float: right;
            margin-top: 2px;
        }

        /* Main Workspace */
        main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Submit Panel */
        .panel {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .panel-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #ccc;
        }

        input[type="text"], input[type="file"], select, textarea {
            width: 100%;
            background-color: #252525;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 6px;
            outline: none;
            font-size: 0.95rem;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            border-color: var(--accent-color);
        }

        .btn {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: #00939a;
        }

        .btn:disabled {
            background-color: #444 !important;
            color: #888 !important;
            cursor: not-allowed;
        }

        /* Cooldown Banner */
        .cooldown-text {
            color: var(--cooldown-color);
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* Gallery Media Grid */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .media-card {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .media-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
            cursor: pointer;
        }

        .media-wrapper img, .media-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Video Playback Placeholder Styling */
        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #151515, #252525);
            color: #fff;
            font-size: 0.9rem;
            z-index: 2;
        }

        .video-placeholder .play-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 173, 181, 0.85);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            font-size: 1.5rem;
            transition: transform 0.2s, background 0.2s;
        }

        .video-placeholder:hover .play-icon {
            transform: scale(1.1);
            background: rgba(0, 173, 181, 1);
        }

        /* Chat Board Styling */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 550px;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #181818;
        }

        .chat-bubble {
            background: #252525;
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 80%;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid var(--border-color);
        }

        .chat-bubble .meta {
            font-size: 0.75rem;
            color: var(--accent-color);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .chat-bubble .timestamp {
            color: var(--muted-text);
            font-weight: normal;
            margin-left: 6px;
        }

        .chat-bubble .text {
            word-break: break-word;
            font-size: 0.95rem;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: var(--container-bg);
            border-top: 1px solid var(--border-color);
        }

        .chat-input-area input[type="text"] {
            flex: 1;
        }

        .chat-input-area .author-input {
            width: 150px;
        }

        @media (max-width: 500px) {
            .chat-input-area {
                flex-direction: column;
            }
            .chat-input-area .author-input {
                width: 100%;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>Dynamic Media & Chat Hub</h1>
        <a href="/admin" class="btn" style="background:#333; font-size: 0.85rem;">Admin Interface</a>
    </header>

    <div class="layout-container">
        <!-- Dynamic Sidebar Navigation -->
        <aside>
            <h2>Channels</h2>
            <ul class="board-list" id="boardList">
                <li class="board-item active" data-board="all">All Content</li>
            </ul>
        </aside>

        <!-- Dynamic Content Engine -->
        <main>
            <!-- Media Upload Panel -->
            <div class="panel" id="uploadPanel">
                <div class="panel-title">Submit Assets to Queue</div>
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="submitBoardSelect">Target Channel</label>
                        <select id="submitBoardSelect" required></select>
                    </div>
                    <div class="form-group">
                        <label for="fileInput">Choose Files (Images / Videos)</label>
                        <input type="file" id="fileInput" name="media" multiple accept="image/*,video/*" required>
                    </div>
                    <button type="submit" class="btn" id="uploadBtn">Upload Files</button>
                    <div class="cooldown-text hidden" id="uploadCooldownMsg">Cooldown active. Please wait.</div>
                </form>
            </div>

            <!-- Standard Media Feed Container -->
            <section class="media-grid" id="mediaGrid"></section>

            <!-- Interactive Chat Arena -->
            <section class="chat-container hidden" id="chatContainer">
                <div class="chat-messages" id="chatMessages"></div>
                <form class="chat-input-area" id="chatForm">
                    <input type="text" id="chatAuthor" class="author-input" placeholder="Name / Alias" maxlength="25">
                    <input type="text" id="chatTextInput" placeholder="Type a message..." maxlength="500" required>
                    <button type="submit" class="btn" id="chatBtn">Send</button>
                </form>
                <div class="cooldown-text hidden" style="padding: 0 15px 10px 15px;" id="chatCooldownMsg">Cooldown active. Please wait.</div>
            </section>
        </main>
    </div>

    <script>
        let currentBoard = "all";
        let localData = { boards: {}, posts: [], chatMessages: {} };
        let activeCooldowns = { upload: 0, chat: 0 };
        let cooldownIntervals = {};

        // Local Storage Tracking for Identity
        if (localStorage.getItem('chatAuthor')) {
            document.getElementById('chatAuthor').value = localStorage.getItem('chatAuthor');
        }

        // Clock Cooldown System
        function startLocalTimer(type, seconds) {
            if (cooldownIntervals[type]) clearInterval(cooldownIntervals[type]);
            activeCooldowns[type] = seconds;
            
            const btn = type === 'upload' ? document.getElementById('uploadBtn') : document.getElementById('chatBtn');
            const msg = type === 'upload' ? document.getElementById('uploadCooldownMsg') : document.getElementById('chatCooldownMsg');
            
            btn.disabled = true;
            msg.classList.remove('hidden');

            cooldownIntervals[type] = setInterval(() => {
                activeCooldowns[type]--;
                btn.textContent = type === 'upload' ? `Wait (${activeCooldowns[type]}s)` : `Wait (${activeCooldowns[type]}s)`;
                msg.textContent = `Rate limit active. Wait ${activeCooldowns[type]}s to post again.`;
                
                if (activeCooldowns[type] <= 0) {
                    clearInterval(cooldownIntervals[type]);
                    btn.disabled = false;
                    btn.textContent = type === 'upload' ? 'Upload Files' : 'Send';
                    msg.classList.add('hidden');
                }
            }, 1000);
        }

        // Fetch System Payload
        async function fetchState() {
            try {
                const response = await fetch('/api/data');
                localData = await response.json();
                renderSidebar();
                renderSubmissionDropdown();
                renderWorkspace();
            } catch (err) {
                console.error("System sync process failed:", err);
            }
        }

        // Render Navigation Board Listing
        function renderSidebar() {
            const list = document.getElementById('boardList');
            list.innerHTML = '';

            // Map and sort boards based on custom dynamic positioning order index
            const sortedBoards = Object.entries(localData.boards).sort((a, b) => {
                return (a[1].position || 0) - (b[1].position || 0);
            });

            // Standard Master Feed Node
            const allItem = document.createElement('li');
            allItem.className = `board-item ${currentBoard === 'all' ? 'active' : ''}`;
            allItem.innerHTML = `All Content <span class="board-type-tag">mixed</span>`;
            allItem.addEventListener('click', () => selectBoard('all'));
            list.appendChild(allItem);

            sortedBoards.forEach(([key, config]) => {
                const item = document.createElement('li');
                item.className = `board-item ${currentBoard === key ? 'active' : ''}`;
                item.innerHTML = `${config.title} <span class="board-type-tag">${config.type}</span>`;
                item.addEventListener('click', () => selectBoard(key));
                list.appendChild(item);
            });
        }

        // Filter and Build Dropdowns for Multi-File Submitter
        function renderSubmissionDropdown() {
            const select = document.getElementById('submitBoardSelect');
            select.innerHTML = '';

            Object.entries(localData.boards)
                .filter(([_, config]) => config.type !== 'chat') // Cannot upload media to structural chat text boards
                .forEach(([key, config]) => {
                    const opt = document.createElement('option');
                    opt.value = key;
                    opt.textContent = config.title;
                    select.appendChild(opt);
                });

            // Auto-hide upload manager panel entirely if no media boards are deployed
            const hasMediaBoards = select.children.length > 0;
            document.getElementById('uploadPanel').classList.toggle('hidden', !hasMediaBoards || currentBoard === 'chat');
        }

        // Navigation Controller
        function selectBoard(key) {
            currentBoard = key;
            document.querySelectorAll('.board-item').forEach(el => el.classList.remove('active'));
            fetchState();
        }

        // Work Space Router
        function renderWorkspace() {
            const isChatType = localData.boards[currentBoard]?.type === 'chat';

            if (isChatType) {
                document.getElementById('mediaGrid').classList.add('hidden');
                document.getElementById('uploadPanel').classList.add('hidden');
                document.getElementById('chatContainer').classList.remove('hidden');
                renderChatRoom();
            } else {
                document.getElementById('mediaGrid').classList.remove('hidden');
                document.getElementById('chatContainer').classList.add('hidden');
                
                // Keep upload block contextually active if non-chat elements are available
                const dropdown = document.getElementById('submitBoardSelect');
                if (dropdown.children.length > 0) {
                    document.getElementById('uploadPanel').classList.remove('hidden');
                }
                renderMediaGrid();
            }
        }

        // Lag-Free Media Grid Processing Engine
        function renderMediaGrid() {
            const grid = document.getElementById('mediaGrid');
            grid.innerHTML = '';

            // Filter out items matching specific board views
            const filtered = localData.posts.filter(post => {
                if (currentBoard === 'all') return true;
                return post.board === currentBoard;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--muted-text); padding: 40px;">No media elements posted to this feed channel yet.</div>`;
                return;
            }

            filtered.forEach(post => {
                const card = document.createElement('article');
                card.className = 'media-card';

                const wrapper = document.createElement('div');
                wrapper.className = 'media-wrapper';

                if (post.type === 'video') {
                    // Create play placeholder instead of mounting standard autoplay/preload video tracks
                    const placeholder = document.createElement('div');
                    placeholder.className = 'video-placeholder';
                    placeholder.innerHTML = `
                        <div class="play-icon">▶</div>
                        <span>Click to Stream Video</span>
                    `;

                    wrapper.appendChild(placeholder);

                    // Physical activation event on interaction
                    wrapper.addEventListener('click', () => {
                        placeholder.remove(); // Clean static assets
                        const activeVideo = document.createElement('video');
                        activeVideo.src = post.src;
                        activeVideo.controls = true;
                        activeVideo.autoplay = true;
                        activeVideo.style.zIndex = "1";
                        wrapper.appendChild(activeVideo);
                    }, { once: true });

                } else {
                    const img = document.createElement('img');
                    img.src = post.src;
                    img.loading = 'lazy'; // System resource optimization
                    img.alt = "Uploaded asset";
                    wrapper.appendChild(img);
                }

                card.appendChild(wrapper);
                grid.appendChild(card);
            });
        }

        // Live Chat Feed Constructor
        function renderChatRoom() {
            const container = document.getElementById('chatMessages');
            const messages = localData.chatMessages[currentBoard] || [];
            
            // Track scrolling location before update to keep user pinned down
            const isNearBottom = container.scrollHeight - container.clientHeight - container.scrollTop < 60;

            container.innerHTML = '';

            if (messages.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: var(--muted-text); margin-top: 30px;">Welcome! Start the discussion by writing a message above.</div>`;
                return;
            }

            messages.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = 'chat-bubble';

                const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                bubble.innerHTML = `
                    <div class="meta">${escapeHTML(msg.author)} <span class="timestamp">${timeStr}</span></div>
                    <div class="text">${escapeHTML(msg.text)}</div>
                `;
                container.appendChild(bubble);
            });

            if (isNearBottom) {
                container.scrollTop = container.scrollHeight;
            }
        }

        // Post Media Queue Submit Handler
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (activeCooldowns.upload > 0) return;

            const form = document.getElementById('uploadForm');
            const formData = new FormData();
            
            formData.append('board', document.getElementById('submitBoardSelect').value);
            
            const files = document.getElementById('fileInput').files;
            for (let i = 0; i < files.length; i++) {
                formData.append('media', files[i]);
            }

            try {
                const response = await fetch('/api/posts/submit', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                if (response.ok) {
                    alert("Media successfully buffered into moderation queue!");
                    form.reset();
                    startLocalTimer('upload', 60); // 1-minute safety lock
                    fetchState();
                } else {
                    alert(result.error || "A secure connection error occured.");
                }
            } catch (err) {
                alert("Fail connection handshake during publication run.");
            }
        });

        // Chat Form Message Dispatcher
        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (activeCooldowns.chat > 0) return;

            const authorInput = document.getElementById('chatAuthor');
            const textInput = document.getElementById('chatTextInput');

            const payload = {
                board: currentBoard,
                author: authorInput.value || "Anonymous",
                text: textInput.value
            };

            // Save alias identity to disk locally
            localStorage.setItem('chatAuthor', payload.author);

            try {
                const response = await fetch('/api/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (response.ok) {
                    textInput.value = '';
                    startLocalTimer('chat', 60); // 1-minute chat cooldown lock
                    fetchState();
                } else {
                    alert(result.error || "System rejected connection string.");
                }
            } catch (err) {
                alert("Fail processing output string stream.");
            }
        });

        // XSS Defense String Encoder
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // Initializer Routine
        fetchState();
        
        // Dynamic Long-Polling Interval for Real-time Chat Syncing (every 5 seconds)
        setInterval(() => {
            fetchState();
        }, 5000);
    </script>
</body>
</html>
